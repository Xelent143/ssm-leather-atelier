function Checkout({ go, items, setItems }) {
  const [step, setStep] = React.useState(0);
  const [paymentProvider, setPaymentProvider] = React.useState('stripe');
  const [loading, setLoading] = React.useState('');
  const [error, setError] = React.useState('');
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const ship = 0;
  const tax = 'Confirmed during payment';
  const total = subtotal + ship;
  const cs = ['Contact', 'Delivery', 'Payment'];
  const paymentStatus = new URLSearchParams(window.location.search).get('payment');

  const beginSecureCheckout = async () => {
    if (!items.length || loading) return;
    setLoading(paymentProvider);
    setError('');

    try {
      const response = await fetch(`/api/${paymentProvider}/checkout`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          items: items.map((item) => ({
            id: item.id,
            baseId: item.baseId,
            qty: item.qty,
            size: item.size,
            leather: item.leather,
            productColor: item.productColor,
            collarColor: item.collarColor,
            fitMode: item.fitMode,
          })),
        }),
      });
      const result = await response.json();
      if (!response.ok || !result.url) throw new Error(result.error || `${paymentProvider === 'paypal' ? 'PayPal' : 'Stripe'} checkout is unavailable.`);
      window.location.assign(result.url);
    } catch (checkoutError) {
      setError(checkoutError.message || 'Secure checkout is unavailable. Please try again.');
      setLoading('');
    }
  };

  return (
    <div className="page-fade" style={{ display: 'grid', gridTemplateColumns: '1fr 480px', minHeight: 'calc(100vh - 80px)' }}>
      <div style={{ padding: '48px 64px', borderRight: '1px solid var(--line)' }}>
        <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 12 }}>CHECKOUT · STEP 0{step + 1} OF 3</div>
        <h1 className="display" style={{ fontSize: 48, margin: '0 0 32px', fontWeight: 400 }}>{cs[step]}</h1>

        <div style={{ display: 'flex', gap: 16, marginBottom: 40 }}>
          {cs.map((c, i) => (
            <div key={c} style={{ flex: 1 }}>
              <div style={{ height: 1, background: i <= step ? 'var(--accent-2)' : 'var(--line)', marginBottom: 8 }} />
              <div className="mono" style={{ fontSize: 9, color: i <= step ? 'var(--accent-2)' : 'var(--fg-4)' }}>0{i+1} · {c.toUpperCase()}</div>
            </div>
          ))}
        </div>

        {paymentStatus === 'success' && (
          <div style={{ border: '1px solid var(--accent-2)', padding: 16, marginBottom: 24, color: 'var(--fg-2)' }}>
            Payment completed. Your payment provider will email your receipt and MOTOGRIP GEAR will confirm your order.
          </div>
        )}
        {paymentStatus === 'cancelled' && (
          <div style={{ border: '1px solid var(--line-2)', padding: 16, marginBottom: 24, color: 'var(--fg-3)' }}>
            Checkout was cancelled. Your bag is unchanged.
          </div>
        )}
        {paymentStatus === 'error' && (
          <div role="alert" style={{ border: '1px solid #b44', padding: 14, marginBottom: 20, color: '#b44', fontSize: 13 }}>
            PayPal could not confirm this payment. Your bag is unchanged; please try again or choose Stripe.
          </div>
        )}
        {error && (
          <div role="alert" style={{ border: '1px solid #b44', padding: 14, marginBottom: 20, color: '#b44', fontSize: 13 }}>
            {error}
          </div>
        )}

        {step === 0 && (
          <div className="step-fade">
            <Field label="Email" placeholder="iola@example.com" />
            <Field label="Phone (for delivery)" placeholder="+1 (212) 555 0143" />
            <label style={{ display: 'flex', gap: 10, alignItems: 'center', marginTop: 12, color: 'var(--fg-3)', fontSize: 12 }}>
              <span style={{ width: 14, height: 14, border: '1px solid var(--accent-2)', background: 'var(--accent-2)' }} />
              Send me atelier dispatches (optional)
            </label>
          </div>
        )}
        {step === 1 && (
          <div className="step-fade">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              <Field label="First name" placeholder="Iola" />
              <Field label="Last name" placeholder="Vance" />
            </div>
            <Field label="Address" placeholder="143 Greenpoint Ave" />
            <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: 16 }}>
              <Field label="City" placeholder="Brooklyn" />
              <Field label="State" placeholder="NY" />
              <Field label="ZIP" placeholder="11222" />
            </div>
            <div style={{ marginTop: 24 }}>
              <div className="mono" style={{ fontSize: 10, color: 'var(--fg-3)', marginBottom: 12 }}>DELIVERY METHOD</div>
              {[
                { t: 'Atelier Express', d: '2-3 days · Signed for', p: 'Complimentary' },
                { t: 'White Glove', d: '5-7 days · By appointment', p: '+ $40' },
              ].map((m, i) => (
                <label key={m.t} style={{ display: 'flex', justifyContent: 'space-between', padding: 16, border: i === 0 ? '1px solid var(--accent-2)' : '1px solid var(--line)', marginBottom: 8, cursor: 'pointer' }}>
                  <div>
                    <div style={{ fontFamily: 'var(--display)', fontSize: 18 }}>{m.t}</div>
                    <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginTop: 4 }}>{m.d.toUpperCase()}</div>
                  </div>
                  <div style={{ fontFamily: 'var(--display)', fontSize: 16 }}>{m.p}</div>
                </label>
              ))}
            </div>
          </div>
        )}
        {step === 2 && (
          <div className="step-fade">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 16 }}>
              {[
                { id: 'stripe', label: 'Card · Stripe' },
                { id: 'paypal', label: 'PayPal' },
              ].map((provider) => (
                <button key={provider.id} type="button" className={paymentProvider === provider.id ? 'btn' : 'btn btn-ghost'}
                  aria-pressed={paymentProvider === provider.id}
                  onClick={() => { setPaymentProvider(provider.id); setError(''); }}>
                  {provider.label}
                </button>
              ))}
            </div>
            <div style={{ border: '1px solid var(--line-2)', padding: 24 }}>
              <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 10 }}>
                SECURE PAYMENT · {paymentProvider === 'paypal' ? 'PAYPAL' : 'STRIPE'}
              </div>
              <div style={{ color: 'var(--fg-3)', fontSize: 14, lineHeight: 1.7 }}>
                {paymentProvider === 'paypal'
                  ? 'Continue to PayPal to review your order, choose an eligible funding source, and confirm your delivery address.'
                  : 'Continue to Stripe to enter your payment, billing, and shipping details. MOTOGRIP GEAR never receives or stores your full card number.'}
              </div>
            </div>
          </div>
        )}

        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 48 }}>
          <button className="btn btn-ghost" onClick={() => step === 0 ? go('home') : setStep(step - 1)}>← {step === 0 ? 'Continue Shopping' : 'Back'}</button>
          <button className="btn" disabled={loading || !items.length} onClick={() => step < 2 ? setStep(step + 1) : beginSecureCheckout()}>
            {step < 2
              ? `Continue · ${cs[step + 1]}`
              : loading
                ? `Opening ${loading === 'paypal' ? 'PayPal' : 'Stripe'}…`
                : `Continue to ${paymentProvider === 'paypal' ? 'PayPal' : 'Stripe'} · $${total.toLocaleString()}`} <Icon name="arrow" size={14} />
          </button>
        </div>
      </div>

      <aside style={{ padding: 48, background: 'var(--bg-2)' }}>
        <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 20 }}>YOUR BAG · {items.length} {items.length === 1 ? 'PIECE' : 'PIECES'}</div>
        {items.length === 0 ? (
          <div style={{ color: 'var(--fg-3)', fontSize: 14 }}>Your bag is empty.</div>
        ) : items.map((it, i) => (
          <div key={i} style={{ display: 'flex', gap: 14, padding: '14px 0', borderBottom: '1px solid var(--line)' }}>
            <div className="ph tiny" data-img={it.img ? "1" : null} data-label={it.name.split(' ')[0].toUpperCase()}
              style={{ width: 64, height: 80, flexShrink: 0, '--img': it.img ? `url(${it.img})` : null }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: 'var(--display)', fontSize: 16 }}>{it.name}</div>
              <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginTop: 4 }}>{it.leather} · {it.size} · QTY {it.qty}</div>
              {it.productColor && <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginTop: 4 }}>COLOR · {it.productColor.toUpperCase()}</div>}
              {it.collarColor && <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginTop: 4 }}>COLLAR · {it.collarColor.toUpperCase()}</div>}
            </div>
            <div style={{ fontFamily: 'var(--display)', fontSize: 16 }}>${(it.price * it.qty).toLocaleString()}</div>
          </div>
        ))}
        <div style={{ marginTop: 24, paddingTop: 16, borderTop: '1px solid var(--line-2)' }}>
          {[['Subtotal', subtotal], ['Shipping', ship === 0 ? 'Complimentary' : '$' + ship], ['Tax', tax]].map(([k, v]) => (
            <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0' }}>
              <span className="mono" style={{ fontSize: 10, color: 'var(--fg-3)' }}>{k.toUpperCase()}</span>
              <span style={{ fontSize: 13 }}>{typeof v === 'number' ? '$' + v.toLocaleString() : v}</span>
            </div>
          ))}
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '20px 0 0', borderTop: '1px solid var(--line-2)', marginTop: 8 }}>
            <span className="mono" style={{ fontSize: 11 }}>TOTAL</span>
            <span className="display" style={{ fontSize: 28 }}>${total.toLocaleString()}</span>
          </div>
        </div>
      </aside>
    </div>
  );
}

function Field({ label, placeholder }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>{label.toUpperCase()}</div>
      <input type="text" placeholder={placeholder}
        style={{ width: '100%', padding: '12px 0', background: 'transparent', border: 'none',
          borderBottom: '1px solid var(--line-2)', color: 'var(--fg)', fontFamily: 'var(--sans)',
          fontSize: 14, outline: 'none' }} />
    </div>
  );
}

Object.assign(window, { Lookbook, About, Account, Checkout });

function CustomConsultation() {
  const [step, setStep] = React.useState(0);
  const [form, setForm] = React.useState({ productType: '', silhouette: '', material: '', fit: '', details: '', name: '', email: '', phone: '', contactPreference: 'email' });
  const [status, setStatus] = React.useState('idle');
  const steps = ['Piece', 'Build', 'Fit', 'Reach you'];
  const update = (key, value) => setForm(prev => ({ ...prev, [key]: value }));
  const canContinue = [Boolean(form.productType), Boolean(form.silhouette && form.material), Boolean(form.fit), Boolean(form.name && form.email)][step];
  const submit = async () => { if (!canContinue || status === 'sending') return; setStatus('sending'); try { const response = await fetch('/api/custom-consultations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) }); if (!response.ok) throw new Error(); setStatus('sent'); } catch { setStatus('error'); } };
  const optionButton = (key, value, label) => <button type="button" key={value} onClick={() => update(key, value)} style={{ textAlign: 'left', padding: '16px 18px', border: `1px solid ${form[key] === value ? 'var(--accent-2)' : 'var(--line)'}`, background: form[key] === value ? 'var(--bg-2)' : 'transparent', color: 'var(--fg)', fontFamily: 'var(--sans)', fontSize: 14, cursor: 'pointer' }}>{label}</button>;
  if (status === 'sent') return <div className="page-fade"><PageHero eyebrow="XVIII · CUSTOM CONSULTATION" title="Request" italic="received." dek="Your build notes are with the fit room. We will use the details to begin a more useful conversation about the piece, fit and next step." /><section style={{ padding: '0 48px 112px', maxWidth: 760, margin: '0 auto' }}><div style={{ borderTop: '1px solid var(--line)', borderBottom: '1px solid var(--line)', padding: '40px 0' }}><div className="mono" style={{ color: 'var(--accent-2)', fontSize: 10, marginBottom: 14 }}>BUILD BRIEF SAVED</div><div style={{ fontFamily: 'var(--display)', fontSize: 34, marginBottom: 14 }}>We have the starting point.</div><div style={{ color: 'var(--fg-3)', fontSize: 15, lineHeight: 1.8 }}>A consultation is not an order and no payment is taken here. Your fit team will review the request before discussing design, measurement or pricing.</div></div></section></div>;
  return <div className="page-fade"><PageHero eyebrow="XVIII · CUSTOM CONSULTATION" title="Build it around" italic="your ride." dek="Start with the piece, material and fit you have in mind. A real consultation follows before anything is cut or priced." /><section style={{ padding: '0 48px 112px', maxWidth: 980, margin: '0 auto' }}><div className="mono" style={{ color: 'var(--fg-4)', fontSize: 10, marginBottom: 18 }}>STEP {step + 1} OF {steps.length} · {steps[step].toUpperCase()}</div><div style={{ height: 2, background: 'var(--line)', marginBottom: 48 }}><div style={{ width: `${((step + 1) / steps.length) * 100}%`, height: '100%', background: 'var(--accent-2)', transition: 'width .25s ease' }} /></div>{step === 0 && <div><h2 className="display" style={{ fontSize: 'clamp(34px, 5vw, 58px)', fontWeight: 400, margin: '0 0 24px' }}>What are we building?</h2><div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>{[['jacket', 'Leather jacket'], ['vest', 'Moto vest'], ['trouser', 'Leather trouser'], ['other', 'Not sure yet — help me choose']].map(([value, label]) => optionButton('productType', value, label))}</div></div>}{step === 1 && <div><h2 className="display" style={{ fontSize: 'clamp(34px, 5vw, 58px)', fontWeight: 400, margin: '0 0 24px' }}>Set the direction.</h2><div className="mono" style={{ color: 'var(--accent-2)', fontSize: 10, marginBottom: 10 }}>SILHOUETTE</div><div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10, marginBottom: 30 }}>{[['cafe', 'Café racer'], ['biker', 'Biker / asymmetric'], ['utility', 'Utility / club'], ['other', 'A different idea']].map(([value, label]) => optionButton('silhouette', value, label))}</div><div className="mono" style={{ color: 'var(--accent-2)', fontSize: 10, marginBottom: 10 }}>MATERIAL</div><div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>{[['lambskin', 'Lambskin'], ['nappa', 'Waxed nappa'], ['oiled', 'Oiled hide'], ['guidance', 'I need guidance']].map(([value, label]) => optionButton('material', value, label))}</div></div>}{step === 2 && <div><h2 className="display" style={{ fontSize: 'clamp(34px, 5vw, 58px)', fontWeight: 400, margin: '0 0 24px' }}>How should it fit?</h2><div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10, marginBottom: 30 }}>{[['standard', 'Standard sizing'], ['measure', 'Custom measurements'], ['guidance', 'Help with sizing']].map(([value, label]) => optionButton('fit', value, label))}</div><label className="mono" style={{ display: 'block', color: 'var(--accent-2)', fontSize: 10, marginBottom: 8 }}>DETAILS THAT MATTER</label><textarea value={form.details} onChange={e => update('details', e.target.value)} rows={6} placeholder="Colour, lining, hardware, pockets, a reference piece or the way you ride." style={{ width: '100%', boxSizing: 'border-box', padding: '14px 0', background: 'transparent', border: 'none', borderTop: '1px solid var(--line)', borderBottom: '1px solid var(--line)', color: 'var(--fg)', fontFamily: 'var(--sans)', fontSize: 15, lineHeight: 1.7, outline: 'none', resize: 'vertical' }} /></div>}{step === 3 && <div><h2 className="display" style={{ fontSize: 'clamp(34px, 5vw, 58px)', fontWeight: 400, margin: '0 0 24px' }}>Where should we reach you?</h2><div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}><label><span className="mono" style={{ display: 'block', color: 'var(--fg-4)', fontSize: 9, marginBottom: 6 }}>NAME *</span><input value={form.name} onChange={e => update('name', e.target.value)} autoComplete="name" style={{ width: '100%', boxSizing: 'border-box', padding: '12px 0', background: 'transparent', border: 'none', borderBottom: '1px solid var(--line-2)', color: 'var(--fg)', fontFamily: 'var(--sans)', fontSize: 14, outline: 'none' }} /></label><label><span className="mono" style={{ display: 'block', color: 'var(--fg-4)', fontSize: 9, marginBottom: 6 }}>EMAIL *</span><input type="email" value={form.email} onChange={e => update('email', e.target.value)} autoComplete="email" style={{ width: '100%', boxSizing: 'border-box', padding: '12px 0', background: 'transparent', border: 'none', borderBottom: '1px solid var(--line-2)', color: 'var(--fg)', fontFamily: 'var(--sans)', fontSize: 14, outline: 'none' }} /></label><label><span className="mono" style={{ display: 'block', color: 'var(--fg-4)', fontSize: 9, marginBottom: 6 }}>PHONE · OPTIONAL</span><input type="tel" value={form.phone} onChange={e => update('phone', e.target.value)} autoComplete="tel" style={{ width: '100%', boxSizing: 'border-box', padding: '12px 0', background: 'transparent', border: 'none', borderBottom: '1px solid var(--line-2)', color: 'var(--fg)', fontFamily: 'var(--sans)', fontSize: 14, outline: 'none' }} /></label><label><span className="mono" style={{ display: 'block', color: 'var(--fg-4)', fontSize: 9, marginBottom: 6 }}>BEST CONTACT METHOD</span><select value={form.contactPreference} onChange={e => update('contactPreference', e.target.value)} style={{ width: '100%', padding: '12px 0', background: 'transparent', border: 'none', borderBottom: '1px solid var(--line-2)', color: 'var(--fg)', fontFamily: 'var(--sans)', fontSize: 14, outline: 'none' }}><option value="email">Email</option><option value="phone">Phone</option><option value="either">Either</option></select></label></div></div>}{status === 'error' && <div role="alert" style={{ color: '#b54735', fontSize: 14, marginTop: 22 }}>We could not save your request. Please try again or contact the fit room directly.</div>}<div style={{ display: 'flex', justifyContent: 'space-between', gap: 16, marginTop: 40, paddingTop: 24, borderTop: '1px solid var(--line)' }}><button type="button" className="btn btn-ghost" disabled={step === 0} onClick={() => setStep(current => Math.max(0, current - 1))}>Back</button>{step < steps.length - 1 ? <button type="button" className="btn" disabled={!canContinue} onClick={() => setStep(current => current + 1)}>Continue</button> : <button type="button" className="btn" disabled={!canContinue || status === 'sending'} onClick={submit}>{status === 'sending' ? 'Saving request…' : 'Submit consultation'}</button>}</div><div className="mono" style={{ color: 'var(--fg-4)', fontSize: 9, lineHeight: 1.7, marginTop: 16 }}>NO PAYMENT IS TAKEN HERE. A CONSULTATION REQUEST STARTS A CONVERSATION; IT DOES NOT CREATE AN ORDER.</div></section></div>;

            <div style={{ fontFamily: 'var(--display)', fontSize: 28, marginBottom: 12 }}>30 days, on stock pieces.</div>

          </div>
          <div>
            <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 16 }}>HOW</div>
            <div style={{ fontFamily: 'var(--display)', fontSize: 28, marginBottom: 12 }}>One label, one note.</div>
            <div style={{ color: 'var(--fg-3)', fontSize: 14, lineHeight: 1.8 }}>
              File a return request using our online form. We send return instructions after reviewing the request. Approved refunds are processed after the piece arrives and passes inspection.

            <button className="btn btn-ghost" style={{ marginTop: 20 }} onClick={() => go('file-return')}>File a Return</button>
          </div>
        </div>}
      </section>
    </div>
  );
}

function FileReturn({ go }) {
  const emptyForm = {
    name: '', orderNumber: '', email: '', item: '', requestType: '', reason: '',
    details: '', acceptedPolicy: false, website: '',
  };
  const [form, setForm] = React.useState(emptyForm);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [requestId, setRequestId] = React.useState('');
  const update = (field, value) => setForm((current) => ({ ...current, [field]: value }));
  const controlStyle = {
    width: '100%', padding: '14px 0', background: 'transparent',
    border: 'none', borderBottom: '1px solid var(--line-2)', color: 'var(--fg)',
    fontFamily: 'var(--sans)', fontSize: 14, outline: 'none', borderRadius: 0,
  };

  const submit = async (event) => {
    event.preventDefault();
    setError('');
    setLoading(true);
    try {
      const response = await fetch('/api/returns', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(form),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Unable to submit your return request.');
      setRequestId(data.requestId || 'RECEIVED');
      setForm(emptyForm);
    } catch (requestError) {
      setError(requestError.message || 'Unable to submit your return request.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="page-fade">
      <PageHero
        eyebrow="RETURN SUPPORT"
        title="File a"
        italic="return."
        dek="Tell us what you would like to return or alter. Our team will review your request and email the next steps before you ship anything."
      />

      <section className="return-form-layout" style={{ padding: '0 48px 96px', maxWidth: 1120, margin: '0 auto', display: 'grid', gridTemplateColumns: 'minmax(0, 2fr) minmax(260px, 1fr)', gap: 72 }}>
        <div>
          {requestId ? (
            <div className="step-fade" style={{ borderTop: '1px solid var(--line)', borderBottom: '1px solid var(--line)', padding: '48px 0' }}>
              <div className="mono" style={{ color: 'var(--accent-2)', fontSize: 10, marginBottom: 14 }}>REQUEST RECEIVED · {requestId}</div>
              <h2 style={{ fontFamily: 'var(--display)', fontWeight: 400, fontSize: 38, margin: '0 0 16px' }}>We will review your request.</h2>
              <p style={{ color: 'var(--fg-3)', fontSize: 14, lineHeight: 1.8, maxWidth: 620 }}>
                Keep this request number for your records. Return instructions will be sent to the checkout email after eligibility is reviewed. Please do not ship the item until you receive authorization.
              </p>
              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginTop: 28 }}>
                <button className="btn" onClick={() => setRequestId('')}>File Another Request</button>
                <button className="btn btn-ghost" onClick={() => go('track')}>Track Your Order</button>
              </div>
            </div>
          ) : (
            <form onSubmit={submit} style={{ borderTop: '1px solid var(--line)', paddingTop: 36 }}>
              <div className="return-form-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '28px 32px' }}>
                <label>
                  <span className="mono" style={{ display: 'block', fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>FULL NAME</span>
                  <input value={form.name} onChange={(event) => update('name', event.target.value)} required autoComplete="name" placeholder="Your name" style={controlStyle} />
                </label>
                <label>
                  <span className="mono" style={{ display: 'block', fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>ORDER NUMBER</span>
                  <input value={form.orderNumber} onChange={(event) => update('orderNumber', event.target.value)} required autoCapitalize="characters" placeholder="MG-1001" style={controlStyle} />
                </label>
                <label>
                  <span className="mono" style={{ display: 'block', fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>CHECKOUT EMAIL</span>
                  <input type="email" value={form.email} onChange={(event) => update('email', event.target.value)} required autoComplete="email" placeholder="you@example.com" style={controlStyle} />
                </label>
                <label>
                  <span className="mono" style={{ display: 'block', fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>ITEM</span>
                  <input value={form.item} onChange={(event) => update('item', event.target.value)} placeholder="Product name" style={controlStyle} />
                </label>
                <label>
                  <span className="mono" style={{ display: 'block', fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>REQUEST</span>
                  <select value={form.requestType} onChange={(event) => update('requestType', event.target.value)} required style={controlStyle}>
                    <option value="">Select one</option>
                    <option value="Refund">Return for refund</option>
                    <option value="Exchange">Exchange</option>
                    <option value="Store credit">Store credit</option>
                    <option value="Fit alteration">Fit alteration</option>
                  </select>
                </label>
                <label>
                  <span className="mono" style={{ display: 'block', fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>REASON</span>
                  <select value={form.reason} onChange={(event) => update('reason', event.target.value)} required style={controlStyle}>
                    <option value="">Select one</option>
                    <option value="Fit or size">Fit or size</option>
                    <option value="Changed mind">Changed mind</option>
                    <option value="Damaged or defective">Damaged or defective</option>
                    <option value="Incorrect item">Incorrect item</option>
                    <option value="Other">Other</option>
                  </select>
                </label>
                <label style={{ gridColumn: '1 / -1' }}>
                  <span className="mono" style={{ display: 'block', fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>DETAILS</span>
                  <textarea value={form.details} onChange={(event) => update('details', event.target.value)} required minLength="10" rows="5" placeholder="Describe the item condition, fit issue, or reason for the request." style={{ ...controlStyle, resize: 'vertical', lineHeight: 1.7 }} />
                </label>
                <label aria-hidden="true" style={{ position: 'absolute', left: '-10000px', width: 1, height: 1, overflow: 'hidden' }}>
                  Website
                  <input tabIndex="-1" autoComplete="off" value={form.website} onChange={(event) => update('website', event.target.value)} />
                </label>
                <label style={{ gridColumn: '1 / -1', display: 'flex', gap: 12, alignItems: 'flex-start', color: 'var(--fg-3)', fontSize: 12, lineHeight: 1.7 }}>
                  <input type="checkbox" checked={form.acceptedPolicy} onChange={(event) => update('acceptedPolicy', event.target.checked)} required style={{ marginTop: 4, accentColor: 'var(--accent-2)' }} />
                  <span>I have reviewed the Returns & Refunds policy and understand that I must wait for return authorization before shipping the item.</span>
                </label>
              </div>

              <div aria-live="polite">
                {error && <div style={{ marginTop: 24, padding: 18, border: '1px solid var(--accent-2)', color: 'var(--fg-2)', fontSize: 13 }}>{error}</div>}
              </div>
              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginTop: 28 }}>
                <button className="btn" type="submit" disabled={loading} style={{ opacity: loading ? 0.6 : 1 }}>{loading ? 'Submitting…' : 'Submit Return Request'}</button>
                <button className="btn btn-ghost" type="button" onClick={() => go('returns')}>Read Returns Policy</button>
              </div>
            </form>
          )}
        </div>

        <aside style={{ borderTop: '1px solid var(--line)', paddingTop: 36 }}>
          <div className="mono" style={{ color: 'var(--accent-2)', fontSize: 10, marginBottom: 18 }}>BEFORE YOU BEGIN</div>
          {[
            ['Stock pieces', 'Request a return within 30 days of delivery. Items must be unworn and in original condition.'],
            ['Made to measure', 'Personalised and made-to-measure pieces are eligible for fit-alteration support rather than a standard refund.'],
            ['Wait for approval', 'Do not ship your item until MOTOGRIP GEAR emails your return authorization and instructions.'],
            ['Inspection', 'Refunds or exchanges are completed after the returned piece arrives and passes inspection.'],
          ].map(([title, copy]) => (
            <div key={title} style={{ padding: '0 0 22px', marginBottom: 22, borderBottom: '1px solid var(--line)' }}>
              <div style={{ fontFamily: 'var(--display)', fontSize: 22, marginBottom: 8 }}>{title}</div>
              <div style={{ color: 'var(--fg-3)', fontSize: 12, lineHeight: 1.75 }}>{copy}</div>
            </div>
          ))}
          <div style={{ color: 'var(--fg-3)', fontSize: 12, lineHeight: 1.7 }}>

}

function TrackOrder({ go }) {
  const [orderNumber, setOrderNumber] = React.useState('');
  const [email, setEmail] = React.useState('');
  const [order, setOrder] = React.useState(null);
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [openFaqs, setOpenFaqs] = React.useState([0, 1, 2, 3]);

  const trackingFaqs = [
    {
      q: 'How can I track my order?',
      a: 'Enter your order number and checkout email above. Once your order is dispatched, the latest carrier and tracking details will appear here when they are available.',
    },
    {
      q: 'My order is delayed. What should I do?',
      a: 'Check the carrier tracking first. If there has been no movement for five business days, contact info@motogripgear.com with your order number and we will investigate.',
    },
    {
      q: 'How long will my made-to-measure order take?',
      a: 'Our current production estimate is 2–3 weeks after measurements and design details are approved. Complex custom work may require additional time, which we confirm before production.',
    },
    {
      q: 'How long does shipping take?',
      a: 'Delivery time depends on the destination and courier service. We provide the latest estimate when your order is ready to dispatch; customs processing may add time to international deliveries.',
    },
  ];

  const submit = async (event) => {
    event.preventDefault();
    setError('');
    setOrder(null);
    setLoading(true);
    try {
      const response = await fetch('/api/orders/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ orderNumber, email }),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Unable to check this order right now.');
      setOrder(data.order);
    } catch (requestError) {
      setError(requestError.message || 'Unable to check this order right now.');
    } finally {
      setLoading(false);
    }
  };

  const label = (value) => String(value || 'Pending').replaceAll('_', ' ').toUpperCase();
  const toggleFaq = (index) => setOpenFaqs((current) =>
    current.includes(index) ? current.filter((item) => item !== index) : [...current, index]
  );

  return (
    <div className="page-fade">
      <PageHero
        eyebrow="ORDER SUPPORT"
        title="Track"
        italic="your order."
        dek="Enter your order number and the email address used at checkout. We will show the latest fulfillment and delivery information available."
      />

      <section style={{ padding: '0 48px 96px', maxWidth: 900, margin: '0 auto' }}>
        <form onSubmit={submit} style={{ borderTop: '1px solid var(--line)', paddingTop: 40 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32 }}>
            <label>
              <span className="mono" style={{ display: 'block', fontSize: 9, color: 'var(--fg-4)', marginBottom: 8 }}>ORDER NUMBER</span>
              <input value={orderNumber} onChange={(event) => setOrderNumber(event.target.value)}
                placeholder="MG-1001" autoComplete="off" autoCapitalize="characters" required
                style={{ width: '100%', padding: '15px 0', background: 'transparent', border: 'none',
                  borderBottom: '1px solid var(--line-2)', color: 'var(--fg)', fontFamily: 'var(--sans)',
                  fontSize: 15, outline: 'none' }} />
            </label>
            <label>
              <span className="mono" style={{ display: 'block', fontSize: 9, color: 'var(--fg-4)', marginBottom: 8 }}>CHECKOUT EMAIL</span>
              <input type="email" value={email} onChange={(event) => setEmail(event.target.value)}
                placeholder="you@example.com" autoComplete="email" required
                style={{ width: '100%', padding: '15px 0', background: 'transparent', border: 'none',
                  borderBottom: '1px solid var(--line-2)', color: 'var(--fg)', fontFamily: 'var(--sans)',
                  fontSize: 15, outline: 'none' }} />
            </label>
          </div>

          <button className="btn" type="submit" disabled={loading}
            style={{ marginTop: 32, opacity: loading ? 0.6 : 1 }}>
            {loading ? 'Checking…' : 'Track Order'}
          </button>
        </form>

        <div aria-live="polite">
          {error && (
            <div style={{ marginTop: 32, padding: 24, border: '1px solid var(--accent-2)', background: 'var(--bg-2)' }}>
              <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 8 }}>ORDER NOT FOUND</div>
              <div style={{ color: 'var(--fg-3)', fontSize: 14, lineHeight: 1.7 }}>{error}</div>
              <button className="btn btn-ghost" type="button" style={{ marginTop: 18 }} onClick={() => go('contact')}>Contact Support</button>
            </div>
          )}

          {order && (
            <div className="step-fade" style={{ marginTop: 48, padding: 32, border: '1px solid var(--line)', background: 'var(--bg-2)' }}>
              <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 10 }}>ORDER · {order.id}</div>
              <div style={{ fontFamily: 'var(--display)', fontSize: 34, marginBottom: 28 }}>{label(order.fulfillment)}</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24 }}>
                <div>
                  <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>ORDER DATE</div>
                  <div style={{ color: 'var(--fg-2)' }}>{order.date || 'Available soon'}</div>
                </div>
                <div>
                  <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>STATUS</div>
                  <div style={{ color: 'var(--fg-2)' }}>{label(order.status)}</div>
                </div>
                <div>
                  <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>FIT</div>
                  <div style={{ color: 'var(--fg-2)' }}>{order.fit || 'Standard order'}</div>
                </div>
              </div>
              {(order.carrier || order.trackingNumber || order.estimatedDelivery) && (
                <div style={{ marginTop: 28, paddingTop: 24, borderTop: '1px solid var(--line)', color: 'var(--fg-3)', lineHeight: 1.8 }}>
                  {order.carrier && <div>Carrier: {order.carrier}</div>}
                  {order.trackingNumber && <div>Tracking number: {order.trackingNumber}</div>}
                  {order.estimatedDelivery && <div>Estimated delivery: {order.estimatedDelivery}</div>}
                  {order.trackingUrl && <a className="mono ulink" href={order.trackingUrl} target="_blank" rel="noreferrer"
                    style={{ display: 'inline-block', marginTop: 12, color: 'var(--accent-2)', fontSize: 10 }}>OPEN CARRIER TRACKING →</a>}
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{ marginTop: 80 }}>
          <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 12 }}>ORDER HELP</div>
          <h2 style={{ fontFamily: 'var(--display)', fontSize: 'clamp(32px, 4vw, 52px)', fontWeight: 400, margin: '0 0 32px' }}>
            Tracking, <em style={{ color: 'var(--accent-2)' }}>answered.</em>
          </h2>

          <div style={{ borderTop: '1px solid var(--line-2)' }}>
            {trackingFaqs.map((faq, index) => {
              const isOpen = openFaqs.includes(index);
              return (
                <div key={faq.q} style={{ borderBottom: '1px solid var(--line-2)' }}>
                  <button type="button" onClick={() => toggleFaq(index)} aria-expanded={isOpen}
                    style={{ width: '100%', padding: '24px 0', border: 0, background: 'transparent', color: 'var(--fg)',
                      display: 'flex', justifyContent: 'space-between', gap: 24, alignItems: 'center', textAlign: 'left', cursor: 'pointer' }}>
                    <span style={{ fontFamily: 'var(--display)', fontSize: 24 }}>{faq.q}</span>
                    <span className="mono" aria-hidden="true" style={{ color: 'var(--accent-2)', fontSize: 18 }}>{isOpen ? '−' : '+'}</span>
                  </button>
                  {isOpen && (
                    <div className="step-fade" style={{ color: 'var(--fg-3)', fontSize: 14, lineHeight: 1.8, maxWidth: 760, padding: '0 48px 24px 0' }}>
                      {faq.a}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </section>
    </div>
  );
}

<script type="text/babel" data-presets="env,react" data-file="ssm-app.jsx">
// Root app — routing + state + tweaks panel + page-level SEO.
//
// Routing is React state (`view` + `params`) — kept this way so the prototype
// continues to work without a build step. The exported `go(view, params)`
// scrolls to top, syncs the URL hash so a refresh keeps you on the page, and
// updates document.title from SSM_SEO. All inner pages are wired here.

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "light",
  "hero": "fullbleed",
  "displayFont": "serif",
  "showAtelier": true,
  "showLookbook": true,
  "showPress": true,
  "accentBoost": false
}/*EDITMODE-END*/;

// SSM_SEO comes from ssm-data.jsx
const SSM_INITIAL_ROUTE = window.__SSM_INITIAL_ROUTE__ || null;
const productFromSlug = (slug) => SSM_PRODUCTS.find(p => p.slug === slug) || null;
const supportPageFromPath = () => ({
  '/shipping-information': 'ship',
  '/returns-refunds': 'returns',
  '/custom-consultation': 'consult',
})[window.location.pathname.replace(/\/$/, '')] || null;
const pathProductSlug = () => {
  const match = window.location.pathname.match(/^\/products\/([a-z0-9-]+)\/?$/);
  return match ? match[1] : null;
};

function applySEO(view, params) {
  const seo = (view === 'shop' && params?.gender === 'Women') ? SSM_SEO.shopWomen
    : (view === 'shop' && params?.gender === 'Men') ? SSM_SEO.shopMen
    : SSM_SEO[view] || SSM_SEO.home;
  let title = seo?.title || 'MOTOGRIP GEAR — Road-Cut Leather Jackets & Moto Gear';
  let desc  = seo?.desc  || '';
  if (view === 'pdp') {
    const p = params?.product || SSM_PRODUCTS[0];
    title = SSM_SEO.pdp.title
      .replace('%name%', p.name)
      .replace('%cat%', p.cat)
      .replace('%gender%', p.gender);
    desc = (p.story?.piece || p.blurb || '').slice(0, 158);
  }
  if (view === 'article' && params?.article) {
    title = `${params.article.title} · MOTOGRIP Road Notes`;
    desc = params.article.dek || '';
  }
  document.title = title;
  let m = document.querySelector('meta[name="description"]');
  if (!m) {
    m = document.createElement('meta'); m.setAttribute('name', 'description');
    document.head.appendChild(m);
  }
  m.setAttribute('content', desc || 'Premium motorcycle leather jackets, vests, and trousers with made-to-measure fit options.');
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = React.useState(() => {
    const initialSlug = SSM_INITIAL_ROUTE?.productSlug || pathProductSlug();
    if (initialSlug && productFromSlug(initialSlug)) return 'pdp';
    const supportPage = supportPageFromPath();
    if (supportPage) return supportPage;
    // Resume from hash on refresh.
    const h = (window.location.hash || '').replace(/^#\/?/, '').split('/')[0];
    return h && ['home','shop','pdp','mto','lookbook','about','account','checkout',
      'journal','article','care','repairs','concierge','sustain','stockists',
      'press','giftcard','faq','size','ship','returns','file-return','track','privacy','terms','consult','contact','search','notfound'
    ].includes(h) ? h : 'home';
  });
  const [params, setParams] = React.useState(() => {
    const initialSlug = SSM_INITIAL_ROUTE?.productSlug || pathProductSlug();
    const product = initialSlug ? productFromSlug(initialSlug) : null;
    return product ? { product } : {};
  });
  const [cart, setCart] = React.useState(() => {
    try {
      const raw = window.localStorage && localStorage.getItem('ssm:cart');
      if (raw) return JSON.parse(raw);
    } catch (_) {}
    return [
      { id: 'p2', name: 'Hadley Café Racer', price: 1180, qty: 1, leather: 'Tobacco', size: 'M', img: SSM_PRODUCTS[1].img },
    ];
  });
  const [cartOpen, setCartOpen] = React.useState(false);
  const [quickView, setQuickView] = React.useState(null);
  const [searchOpen, setSearchOpen] = React.useState(false);
  const [searchQuery, setSearchQuery] = React.useState('');

  // Persist cart
  React.useEffect(() => {
    try { window.localStorage && localStorage.setItem('ssm:cart', JSON.stringify(cart)); } catch (_) {}
  }, [cart]);

  // SEO sync
  React.useEffect(() => { applySEO(view, params); }, [view, params]);

  // URL sync (product pages use crawlable paths; legacy pages keep hash routes)
  React.useEffect(() => {
    if (view === 'pdp' && params?.product?.slug) {
      const path = `/products/${params.product.slug}`;
      if (window.location.pathname !== path) window.history.replaceState(null, '', path);
      return;
    }
    const h = '#/' + view;
    if (window.location.hash !== h) window.history.replaceState(null, '', h);
  }, [view, params]);

  const go = (v, p = {}) => {
    setView(v);
    setParams(p);
    window.scrollTo({ top: 0, behavior: 'auto' });
  };

  // Cart merging — same product + size + leather + product color + collar + fit selection increments qty.
  const addToCart = (product, opts) => {
    setCart(prev => {
      const measurementSig = (m) => m ? Object.entries(m).map(([k, v]) => `${k}:${v || ''}`).join('|') : '';
      const sig = (it) => `${it.baseId || it.id.split('-')[0]}|${it.size}|${it.leather}|${it.productColor || ''}|${it.collarColor || ''}|${it.fitMode || 'standard'}|${measurementSig(it.measurements)}`;
      const incoming = {
        baseId: product.id,
        id: product.id + '-' + Date.now(),
        name: product.name,
        price: opts.price ?? (product.price + (opts.surcharge || 0)),
        basePrice: product.price,
        surcharge: opts.surcharge || 0,
        qty: 1,
        img: product.img,
        leather: opts.leather, size: opts.size,
        productColor: opts.productColor || null,
        collarColor: opts.collarColor || null,
        fitMode: opts.fitMode || 'standard',
        fitLabel: opts.fitLabel || null,
        measurements: opts.measurements || null,
      };
      const idx = prev.findIndex(it => sig(it) === sig(incoming));
      if (idx > -1) {
        return prev.map((it, i) => i === idx ? { ...it, qty: it.qty + 1 } : it);
      }
      return [...prev, incoming];
    });
    setCartOpen(true);
  };

  // Search submit
  const submitSearch = (q) => {
    setSearchQuery(q);
    setSearchOpen(false);
    go('search', {});
  };

  const themeClass =
    (t.palette === 'dark' ? 'theme-dark ' : t.palette === 'heritage' ? 'theme-heritage ' : 'theme-light ') +
    'font-' + t.displayFont;

  return (
    <div className={themeClass} style={{ minHeight: '100vh', background: 'var(--bg)', color: 'var(--fg)' }}>
      <Header go={go} view={view}
        onCartClick={() => setCartOpen(true)}
        onSearchClick={() => setSearchOpen(true)}
        cartCount={cart.reduce((n, it) => n + it.qty, 0)} />

      {view === 'home' && <Home go={go} onQuickView={setQuickView} heroVariant={t.hero} />}
      {view === 'shop' && <Shop go={go} onQuickView={setQuickView} initialGender={params.gender} initialCat={params.cat} />}
      {view === 'pdp' && <PDP product={params.product} go={go} addToCart={addToCart} onQuickView={setQuickView} />}
      {view === 'mto' && <MTO go={go} startWith={params.startWith} addToCart={addToCart} />}
      {view === 'lookbook' && <Lookbook go={go} />}
      {view === 'about' && <About go={go} />}
      {view === 'account' && <Account go={go} />}
      {view === 'checkout' && <Checkout go={go} items={cart} setItems={setCart} />}
      {view === 'journal' && <Journal go={go} />}
      {view === 'article' && <JournalArticle go={go} article={params.article} />}
      {view === 'care' && <Care go={go} />}
      {view === 'repairs' && <Repairs go={go} />}
      {view === 'concierge' && <Concierge go={go} />}
      {view === 'sustain' && <Sustainability go={go} />}
      {view === 'stockists' && <Stockists go={go} />}
      {view === 'press' && <Press go={go} />}
      {view === 'giftcard' && <GiftCards go={go} />}
      {view === 'faq' && <FAQ go={go} />}
      {view === 'size' && <SizeGuide go={go} />}
      {view === 'ship' && <ShippingReturns go={go} mode="shipping" />}
      {view === 'returns' && <ShippingReturns go={go} mode="returns" />}
      {view === 'file-return' && <FileReturn go={go} />}
      {view === 'track' && <TrackOrder go={go} />}
      {view === 'privacy' && <LegalPage kind="privacy" go={go} />}
      {view === 'terms' && <LegalPage kind="terms" go={go} />}
      {view === 'consult' && <CustomConsultation go={go} />}
      {view === 'contact' && <Contact go={go} />}
      {view === 'search' && <SearchResults go={go} query={searchQuery} onQuickView={setQuickView} />}
      {view === 'notfound' && <NotFound go={go} />}

      <Footer go={go} />

      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)}
        items={cart} setItems={setCart} go={go} />
      <QuickView product={quickView} onClose={() => setQuickView(null)} addToCart={addToCart} go={go} />
      <SearchOverlay open={searchOpen} onClose={() => setSearchOpen(false)} onSubmit={submitSearch} />

      <TweaksPanel title="MOTOGRIP · Tweaks">
        <TweakSection label="Palette" />
        <TweakRadio label="Theme" value={t.palette}
          options={[
            { value: 'dark', label: 'Dark' },
            { value: 'light', label: 'Light' },
            { value: 'heritage', label: 'Heritage' },
          ]}
          onChange={v => setTweak('palette', v)} />

        <TweakSection label="Hero Layout" />
        <TweakRadio label="Variant" value={t.hero}
          options={[
            { value: 'fullbleed', label: 'Bleed' },
            { value: 'editorial-split', label: 'Split' },
            { value: 'centered-type', label: 'Type' },
          ]}
          onChange={v => setTweak('hero', v)} />

        <TweakSection label="Typography" />
        <TweakRadio label="Display" value={t.displayFont}
          options={[
            { value: 'serif', label: 'Serif' },
            { value: 'sans', label: 'Sans' },
            { value: 'mono', label: 'Mono' },
          ]}
          onChange={v => setTweak('displayFont', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
