        transparent 1px,

    background-position: center;
    overflow: hidden;
  }
  .ph[data-img] {

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .ph[data-img]::before { display: none; }
  .ph::before {
    content: attr(data-label);
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(20,18,15,0.40);
    text-align: center;
    padding: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .ph.tiny::before { font-size: 8.5px; }

  /* common */
  .mono { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .display { font-family: var(--display); font-weight: 400; letter-spacing: -0.01em; }
  .rule { height: 1px; background: var(--line); width: 100%; }

    --bg-3: #252A2D;

    --fg-3: rgba(242,235,221,0.64);
    --fg-4: rgba(242,235,221,0.42);
    --accent: #A9271D;
    --accent-2: #FF5A1F;

        rgba(232,226,213,0.025) 0px,
        rgba(232,226,213,0.025) 1px,
        transparent 1px,
        transparent 14px
      ),
      linear-gradient(180deg, #1a1614 0%, #0e0c0a 100%);
  }
  .theme-dark .ph::before { color: rgba(232,226,213,0.35); }

  /* light theme overrides */
  .theme-light {
    --bg: #f5f1e8;
    --bg-2: #ece5d3;
    --bg-3: #e0d6bf;
    --line: rgba(20,18,15,0.12);
    --line-2: rgba(20,18,15,0.22);
    --fg: #161A1C;
    --fg-2: #252A2D;
    --fg-3: rgba(22,26,28,0.64);
    --fg-4: rgba(22,26,28,0.42);
    --accent: #A9271D;
    --accent-2: #FF5A1F;
    --chrome-bg: rgba(245,241,232,0.90);
    --hero-scrim: linear-gradient(180deg, rgba(245,241,232,0.10) 0%, rgba(245,241,232,0) 30%, rgba(245,241,232,0.18) 58%, rgba(245,241,232,0.94) 100%);
    --hero-center-scrim: linear-gradient(180deg, var(--bg) 0%, transparent 26%, rgba(245,241,232,0.1) 68%, var(--bg) 100%);
    --media-caption-scrim: linear-gradient(180deg, transparent 38%, rgba(245,241,232,0.9) 100%);

  }
  .theme-light .ph {
    background:
      repeating-linear-gradient(
        135deg,
        rgba(20,18,15,0.04) 0px,
        rgba(20,18,15,0.04) 1px,

    background-image: var(--img);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* heritage theme */
  .theme-heritage {
    --bg: #1f1815;
    --bg-2: #2a201a;
    --bg-3: #34281f;
    --line: rgba(212,184,140,0.14);
    --line-2: rgba(212,184,140,0.25);
    --fg: #e8d9b8;
    --fg-2: #d4b88c;
    --fg-3: rgba(232,217,184,0.62);
    --fg-4: rgba(232,217,184,0.40);
    --accent: #c8a45c;
    --accent-2: #8a3a28;
  }
  .theme-heritage .ph {
    background:
      repeating-linear-gradient(
        135deg,
        rgba(232,217,184,0.03) 0px,
        rgba(232,217,184,0.03) 1px,
        transparent 1px,
        transparent 14px
      ),
      linear-gradient(180deg, #2a201a 0%, #1a120e 100%);
  }

  /* font tokens for typography tweak */
  .font-serif    { --display: 'Cormorant Garamond', serif; }
  .font-sans     { --display: 'Archivo', sans-serif; }
  .font-mono     { --display: 'JetBrains Mono', monospace; }

  /* primary CTA */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px;
    background: var(--fg);
    color: var(--bg);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: 0;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn:hover { background: var(--accent); color: var(--fg); }
  .btn-ghost {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--line-2);
  }
  .btn-ghost:hover { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  .btn-arrow { font-size: 14px; line-height: 1; }

  /* link underline animation */
  .ulink { position: relative; cursor: pointer; }
  .ulink::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -2px;
    height: 1px; background: currentColor;
    transform: scaleX(0); transform-origin: right;
    transition: transform 0.4s cubic-bezier(.7,0,.3,1);
  }
  .ulink:hover::after { transform: scaleX(1); transform-origin: left; }

  /* drawer */
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .drawer-overlay { animation: fadeIn 0.3s ease; }
  .drawer { animation: slideIn 0.4s cubic-bezier(.7,0,.3,1); }

  /* page transitions */
  .page-fade { animation: fadeIn 0.4s ease; }

  /* marquee */
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { animation: marquee 40s linear infinite; display: flex; gap: 80px; white-space: nowrap; }

  /* hover product card lift */
  .card-img { transition: transform 0.8s cubic-bezier(.2,.6,.2,1); }
  .card:hover .card-img { transform: scale(1.03); }
  .card .quickview {
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .card:hover .quickview { opacity: 1; transform: translateY(0); }

  /* swatch */
  .swatch {
    width: 28px; height: 28px; border-radius: 50%;
    cursor: pointer; position: relative;
    border: 1px solid var(--line-2);
    transition: transform 0.2s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.active { outline: 1px solid var(--fg); outline-offset: 3px; }

  /* scroll snap helpers (for editorial sections) */
  .h-scroll {
    display: flex; gap: 24px; overflow-x: auto; scroll-snap-type: x mandatory;
    scrollbar-width: none;
    padding-bottom: 8px;
  }
  .h-scroll::-webkit-scrollbar { display: none; }
  .h-scroll > * { scroll-snap-align: start; flex-shrink: 0; }

  /* progress dot */
  .pdot { width: 6px; height: 6px; border-radius: 50%; background: var(--line-2); }
  .pdot.on { background: var(--fg); }

  /* smooth fade for steps */
  .step-fade { animation: fadeIn 0.5s ease; }

  /* ───────────────────────────── responsive shims ─────────────────────────── */
  @media (max-width: 1024px) {

  @media (max-width: 900px) {

    [style*="padding: 80px 48px"]   { padding: 56px 20px !important; }
    [style*="padding: 96px 48px"]   { padding: 64px 20px !important; }
    [style*="padding: 120px 48px"]  { padding: 72px 20px !important; }
    [style*="padding: 0 48px"]      { padding: 0 20px !important; }
    [style*="padding: 32px 48px"]   { padding: 24px 20px !important; }
    [style*="padding: 20px 48px"]   { padding: 14px 20px !important; }
    [style*="padding: 48px 48px"]   { padding: 32px 20px !important; }
    [style*="padding: 64px 48px 48px"] { padding: 40px 20px 28px !important; }
    [style*="padding: 64px 48px 64px"] { padding: 40px 20px !important; }
    [style*="padding: 64px 48px 80px"] { padding: 40px 20px 56px !important; }
    [style*="padding: 64px 48px 32px"] { padding: 40px 20px 20px !important; }
    [style*="padding: 80px 48px 48px"] { padding: 56px 20px 32px !important; }
    [style*="padding: 80px 48px 64px"] { padding: 56px 20px 40px !important; }
    [style*="padding: 0 48px 80px"]    { padding: 0 20px 56px !important; }
    [style*="padding: 0 48px 64px"]    { padding: 0 20px 40px !important; }
    [style*="padding: 0 48px 96px"]    { padding: 0 20px 64px !important; }

    /* collapse 4-column grids */
    [style*="gridTemplateColumns: 'repeat(4, 1fr)'"],
    [style*="grid-template-columns: repeat(4, 1fr)"],
    [style*="gridTemplateColumns:\\\"repeat(4, 1fr)\\\""] {
      grid-template-columns: repeat(2, 1fr) !important;
    }

    /* footer stack */
    footer [style*="gridTemplateColumns: '2fr 1fr 1fr 1fr 1fr'"] {
      grid-template-columns: 1fr 1fr !important;
    }
  }

  @media (max-width: 720px) {
    /* PDP grid → single column */
    [style*="grid-template-columns: 80px 1fr 480px"],
    [style*="gridTemplateColumns: '80px 1fr 480px'"] {
      grid-template-columns: 1fr !important;
    }
    /* MTO + Checkout split */
    [style*="grid-template-columns: 1fr 480px"],
    [style*="gridTemplateColumns: '1fr 480px'"] {
      grid-template-columns: 1fr !important;
    }
    /* Hero split goes single column */
    [style*="grid-template-columns: 1fr 1fr"],
    [style*="gridTemplateColumns: '1fr 1fr'"] {
      grid-template-columns: 1fr !important;
    }
    /* 3-col grids → 1-col */
    [style*="gridTemplateColumns: 'repeat(3, 1fr)'"],
    [style*="grid-template-columns: repeat(3, 1fr)"] {
      grid-template-columns: 1fr !important;
    }
    /* footer stack */
    footer [style*="gridTemplateColumns: '2fr 1fr 1fr 1fr 1fr'"] {
      grid-template-columns: 1fr !important;
    }
  }
</style>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

  const [scrolled, setScrolled] = React.useState(false);
  const [mobileOpen, setMobileOpen] = React.useState(false);
  const [isMobile, setIsMobile] = React.useState(
    typeof window !== 'undefined' ? window.innerWidth < 900 : false
  );

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    const onResize = () => setIsMobile(window.innerWidth < 900);
    window.addEventListener('scroll', onScroll);
    window.addEventListener('resize', onResize);
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onResize);
    };
  }, []);

  React.useEffect(() => { setMobileOpen(false); }, [view]);

  return (
    <header style={{
      position: 'sticky', top: 0, zIndex: 50,

      WebkitBackdropFilter: scrolled ? 'blur(20px) saturate(140%)' : 'none',

      <div style={{

            style={{ background: 'transparent', border: 0, padding: 4, color: 'var(--fg-2)', cursor: 'pointer', display: 'inline-flex' }}>

          {!isMobile && (

          <button onClick={onCartClick} className="ulink mono"

          <nav style={{ display: 'flex', flexDirection: 'column' }}>
            {SSM_NAV.map(n => (
              <button key={n.label} onClick={() => go(n.view, n.filter ? { gender: n.filter } : null)}
                style={{
                  textAlign: 'left', padding: '20px 0', borderBottom: '1px solid var(--line)',
                  fontFamily: 'var(--display)', fontSize: 28, fontWeight: 400,
                  color: 'var(--fg)', background: 'transparent', border: 'none',

function Icon({ name, size = 16 }) {
  const icons = {
    search: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,
    arrow: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>,
    close: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2"><path d="M6 6l12 12M18 6l-12 12"/></svg>,
    plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2"><path d="M12 5v14M5 12h14"/></svg>,
    minus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2"><path d="M5 12h14"/></svg>,
    heart: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6 5c2 0 3.5 1 4 2 .5-1 2-2 4-2 3.5 0 5 4 3.5 7-2.5 4.5-9 9-9 9z"/></svg>,
    check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M5 12l5 5L20 7"/></svg>,
  };
  return <span style={{ display: 'inline-flex', width: size, height: size, color: 'currentColor', cursor: 'inherit' }}>{icons[name]}</span>;
}

function CartDrawer({ open, onClose, items, setItems, go }) {
  const [promo, setPromo] = React.useState('');
  if (!open) return null;
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const updateQty = (idx, delta) => {
    setItems(prev => prev.map((it, i) => i === idx ? { ...it, qty: Math.max(1, it.qty + delta) } : it));
  };
  const remove = (idx) => setItems(prev => prev.filter((_, i) => i !== idx));

  // est. delivery — 2 working days from now, ish
  const eta = new Date();
  eta.setDate(eta.getDate() + 4);
  const etaStr = eta.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 100 }}>
      <div className="drawer-overlay" onClick={onClose}
        style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.6)' }} />
      <div className="drawer" style={{
        position: 'absolute', top: 0, right: 0, bottom: 0, width: 'min(460px, 100vw)',
        background: 'var(--bg-2)', borderLeft: '1px solid var(--line)',
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{ padding: '24px 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--line)' }}>
          <div className="mono" style={{ fontSize: 11, color: 'var(--fg-2)' }}>Your Bag · {items.length}</div>
          <button onClick={onClose} aria-label="Close bag"
            style={{ background: 'transparent', border: 0, padding: 4, color: 'var(--fg)', cursor: 'pointer' }}><Icon name="close" /></button>
        </div>

        {items.length > 0 && (
          <div className="mono" style={{
            fontSize: 9, color: 'var(--accent-2)', padding: '12px 32px',
            borderBottom: '1px solid var(--line)', background: 'rgba(176,138,76,0.04)',
            letterSpacing: '0.18em',
          }}>
            ESTIMATED DELIVERY · {etaStr.toUpperCase()}
          </div>
        )}

        <div style={{ flex: 1, overflowY: 'auto', padding: '8px 32px' }}>
          {items.length === 0 ? (
            <div style={{ padding: '80px 0', textAlign: 'center', color: 'var(--fg-3)' }}>
              <div style={{ fontFamily: 'var(--display)', fontSize: 28, marginBottom: 8 }}>The bag is empty.</div>
              <div className="mono" style={{ fontSize: 10, marginBottom: 24 }}>BEGIN WITH A PIECE</div>
              <button className="btn" onClick={() => { onClose(); go('shop'); }}>Browse Gear</button>
            </div>
          ) : items.map((item, idx) => (
            <div key={idx} style={{ display: 'flex', gap: 16, padding: '20px 0', borderBottom: '1px solid var(--line)' }}>
              <div className="ph" data-img={item.img ? "1" : null} data-label={item.name.toUpperCase()}
                style={{ width: 100, height: 130, flexShrink: 0, '--img': item.img ? `url(${item.img})` : null }} />
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
                <div style={{ fontFamily: 'var(--display)', fontSize: 18 }}>{item.name}</div>
                <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginTop: 4 }}>
                  {item.leather} · SIZE {item.size}
                </div>
                {item.fitLabel && (
                  <div className="mono" style={{ fontSize: 9, color: 'var(--accent-2)', marginTop: 5 }}>
                    {item.fitLabel.toUpperCase()}{item.surcharge ? ` · +$${item.surcharge}` : ''}
                  </div>
                )}
                {item.measurements && Object.values(item.measurements).some(Boolean) && (
                  <div className="mono" style={{ fontSize: 8, color: 'var(--fg-4)', marginTop: 5, lineHeight: 1.6 }}>
                    {Object.entries(item.measurements)
                      .filter(([, v]) => v)
                      .map(([k, v]) => `${k.replace(/([A-Z])/g, ' $1').toUpperCase()}: ${v}`)
                      .join(' · ')}
                  </div>
                )}
                <div style={{ flex: 1 }} />
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, border: '1px solid var(--line)', padding: '6px 10px' }}>
                    <button onClick={() => updateQty(idx, -1)} aria-label="Decrease"
                      style={{ display: 'inline-flex', background: 'transparent', border: 0, padding: 0, color: 'var(--fg)', cursor: 'pointer' }}>
                      <Icon name="minus" size={12} />
                    </button>
                    <span style={{ fontSize: 11, minWidth: 14, textAlign: 'center' }}>{item.qty}</span>
                    <button onClick={() => updateQty(idx, 1)} aria-label="Increase"
                      style={{ display: 'inline-flex', background: 'transparent', border: 0, padding: 0, color: 'var(--fg)', cursor: 'pointer' }}>
                      <Icon name="plus" size={12} />
                    </button>
                  </div>
                  <div style={{ fontFamily: 'var(--display)', fontSize: 18 }}>${(item.price * item.qty).toLocaleString()}</div>
                </div>
                <button onClick={() => remove(idx)} className="mono ulink"
                  style={{ fontSize: 9, color: 'var(--fg-4)', marginTop: 8, alignSelf: 'flex-start',
                    background: 'transparent', border: 0, padding: 0, cursor: 'pointer' }}>
                  Remove
                </button>
              </div>
            </div>
          ))}
        </div>
        {items.length > 0 && (
          <div style={{ padding: '20px 32px', borderTop: '1px solid var(--line)', background: 'var(--bg-3)' }}>
            <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
              <input value={promo} onChange={e => setPromo(e.target.value)}
                placeholder="Fit note (optional)"
                style={{ flex: 1, background: 'transparent', border: 'none',
                  borderBottom: '1px solid var(--line-2)', padding: '8px 0',
                  color: 'var(--fg)', fontFamily: 'var(--mono)', fontSize: 11, outline: 'none' }} />
              <button className="mono ulink"
                style={{ fontSize: 10, color: 'var(--fg-2)', background: 'transparent', border: 0, padding: 0, cursor: 'pointer' }}>
                Apply →
              </button>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
              <span className="mono" style={{ fontSize: 10, color: 'var(--fg-3)' }}>Subtotal</span>
              <span style={{ fontFamily: 'var(--display)', fontSize: 22 }}>${subtotal.toLocaleString()}</span>
            </div>
            <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginBottom: 16 }}>
              Complimentary shipping · Duties calculated at checkout
            </div>
            <button className="btn" style={{ width: '100%', justifyContent: 'center' }}
              onClick={() => { onClose(); go('checkout'); }}>
              Proceed to Checkout <Icon name="arrow" size={14} />
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function SearchOverlay({ open, onClose, onSubmit }) {
  const [q, setQ] = React.useState('');
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) {
      setTimeout(() => inputRef.current?.focus(), 50);
    } else {
      setQ('');
    }
  }, [open]);

  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  if (!open) return null;

  const submit = (e) => {
    e?.preventDefault?.();
    if (q.trim()) onSubmit(q.trim());
  };

  const suggestions = ['Biker jacket', 'Cafe racer', 'Made to measure', 'Trousers', 'Road armor'];

  return (
    <div className="page-fade" style={{
      position: 'fixed', inset: 0, zIndex: 110,
      background: 'var(--chrome-bg)',
      backdropFilter: 'blur(20px) saturate(140%)',
      WebkitBackdropFilter: 'blur(20px) saturate(140%)',
      display: 'flex', flexDirection: 'column',
    }}>
      <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '20px 32px' }}>
        <button onClick={onClose} aria-label="Close search"
          style={{ background: 'transparent', border: 0, padding: 4, color: 'var(--fg)', cursor: 'pointer' }}>
          <Icon name="close" size={20} />
        </button>
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 24px' }}>
        <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 24, letterSpacing: '0.4em' }}>
          MOTOGRIP GEAR · SEARCH
        </div>
        <form onSubmit={submit} style={{ width: '100%', maxWidth: 720 }}>
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)}
            placeholder="A name, a hide, a piece"
            style={{
              width: '100%', padding: '20px 0', background: 'transparent', border: 'none',
              borderBottom: '1px solid var(--line-2)', color: 'var(--fg)',
              fontFamily: 'var(--display)', fontSize: 'clamp(28px, 4vw, 48px)',
              textAlign: 'center', outline: 'none',
            }} />
        </form>
        <div style={{ marginTop: 32, display: 'flex', gap: 16, flexWrap: 'wrap', justifyContent: 'center' }}>
          {suggestions.map(s => (
            <button key={s} onClick={() => { setQ(s); onSubmit(s); }} className="mono"
              style={{
                fontSize: 10, padding: '10px 16px', background: 'transparent',
                border: '1px solid var(--line-2)', color: 'var(--fg-2)',
                cursor: 'pointer', letterSpacing: '0.18em',
              }}>
              {s.toUpperCase()}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

<script type="text/babel" data-presets="env,react" data-file="ssm-shop.jsx">
// Shop / PLP — fully working filter, sort, and active-pill state.
// All filter values are real toggles; the "Featured" / "New" sorts work,
// price slider trims the result set, and an empty state replaces the grid
// when no piece matches.

function Shop({ go, onQuickView, initialGender, initialCat }) {
  const [gender, setGender] = React.useState(initialGender || 'All');
  const [cat, setCat] = React.useState(initialCat || 'All');
  const [sort, setSort] = React.useState('Featured');
  const [filterOpen, setFilterOpen] = React.useState(false);

  // Multi-select filters
  const [leathers, setLeathers] = React.useState([]);   // ids
  const [sizes, setSizes] = React.useState([]);         // strings
  const [maxPrice, setMaxPrice] = React.useState(1500);
  const [availability, setAvailability] = React.useState([]);

  React.useEffect(() => { if (initialGender) setGender(initialGender); }, [initialGender]);
  React.useEffect(() => { if (initialCat) setCat(initialCat); }, [initialCat]);

  // Reset filters when category-level changes (so a filter pill doesn't strand on an empty shop).
  const resetFilters = () => {
    setLeathers([]); setSizes([]); setMaxPrice(1500); setAvailability([]);
  };

  const toggle = (set, setter) => (v) => {
    setter(set.includes(v) ? set.filter(x => x !== v) : [...set, v]);
  };

  // Build filtered list
  let products = SSM_PRODUCTS.filter(p => {
    if (gender !== 'All' && p.gender !== gender) return false;
    if (cat !== 'All' && p.cat !== cat) return false;
    if (p.price > maxPrice) return false;
    // sizes: a product passes if any selected size has stock > 0 (or unknown)
    if (sizes.length) {
      const ok = sizes.some(s => !p.stock || p.stock[s] > 0);
      if (!ok) return false;
    }
    // availability - illustrative: 'In stock' is everything with stock,
    // 'Made to measure' is everything (since MTO is offered for all),
    // 'Final pieces' = total stock <=2.
    if (availability.length) {
      const total = p.stock ? Object.values(p.stock).reduce((a,b) => a+b, 0) : 99;
      const tags = [];
      if (total > 0) tags.push('In stock');
      tags.push('Made to measure');
      if (total <= 4) tags.push('Final pieces');
      if (!availability.some(a => tags.includes(a))) return false;
    }
    return true;
  });

  if (sort === 'Price ↑') products = [...products].sort((a, b) => a.price - b.price);
  else if (sort === 'Price ↓') products = [...products].sort((a, b) => b.price - a.price);
  else if (sort === 'New') {
    products = [...products].sort((a, b) => (b.tag === 'New' ? 1 : 0) - (a.tag === 'New' ? 1 : 0));
  }
  // 'Featured' = data order

  // Active filter chips
  const activePills = [
    ...leathers.map(l => ({ k: 'leather:' + l, label: SSM_LEATHERS.find(x => x.id === l)?.name, onClear: () => toggle(leathers, setLeathers)(l) })),
    ...sizes.map(s => ({ k: 'size:' + s, label: 'Size ' + s, onClear: () => toggle(sizes, setSizes)(s) })),
    ...(maxPrice < 1500 ? [{ k: 'price', label: `Under $${maxPrice}`, onClear: () => setMaxPrice(1500) }] : []),
    ...availability.map(a => ({ k: 'av:' + a, label: a, onClear: () => toggle(availability, setAvailability)(a) })),
  ];

  // Per-category lede
  const lede = (() => {
    if (gender === 'Women' && cat === 'All') return "Cut to a woman's frame, not a smaller man's.";
    if (gender === 'Men'   && cat === 'All') return "Built for shoulder, not for show.";
    if (cat === 'Jackets') return "Asymmetric, classic, cropped, long. Twelve silhouettes; one hide doctrine.";
    if (cat === 'Vests')   return "Layering, made obvious. Quilted yokes, raw selvedge, four-pocket utility.";
    if (cat === 'Pants')   return "Tailored from the central panels. High-rise, straight, riding.";
    return "Twelve silhouettes, hand-numbered. Each piece signed by the hand that made it.";
  })();

  return (
    <div className="page-fade">
      <section style={{ padding: '64px 48px 32px' }}>
        <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 16 }}>
          GEAR {gender !== 'All' ? `· ${gender.toUpperCase()}` : ''} {cat !== 'All' ? `· ${cat.toUpperCase()}` : ''}
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 24 }}>
          <h1 className="display" style={{ fontSize: 'clamp(48px, 7vw, 104px)', margin: 0, lineHeight: 0.95, fontWeight: 400 }}>
            {cat === 'All' ? (gender === 'All' ? 'The Collection' : `For ${gender === 'Men' ? 'him' : 'her'}.`) : cat}
          </h1>
          <div style={{ color: 'var(--fg-3)', fontSize: 13, paddingBottom: 8, maxWidth: 520, lineHeight: 1.6 }}>
            {lede}
            <div className="mono" style={{ fontSize: 10, color: 'var(--fg-4)', marginTop: 8 }}>
              {products.length} {products.length === 1 ? 'PIECE' : 'PIECES'}, HAND-NUMBERED
            </div>

          {activePills.map(p => (
            <button key={p.k} onClick={p.onClear}

                    <input type="checkbox" checked={checked}
                      onChange={() => toggle(leathers, setLeathers)(l.id)}
                      style={{ display: 'none' }} />
                    <span style={{
                      width: 14, height: 14,
                      border: '1px solid var(--line-2)',
                      background: checked ? 'var(--fg)' : 'transparent',
                      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    }}>
                      {checked && <span style={{ color: 'var(--bg)', fontSize: 10 }}>✓</span>}

              <div className="mono" style={{ fontSize: 10, color: 'var(--fg-4)', marginBottom: 14 }}>SIZE</div>

                {['XS','S','M','L','XL','XXL'].map(s => {

                    <button key={s} onClick={() => toggle(sizes, setSizes)(s)}
                      style={{
                        padding: '6px 12px', fontSize: 11, cursor: 'pointer',

                        background: on ? 'var(--fg)' : 'transparent',
                        color: on ? 'var(--bg)' : 'var(--fg-2)',

                      }}>{s}</button>

            </div>
            <div>
              <div className="mono" style={{ fontSize: 10, color: 'var(--fg-4)', marginBottom: 14 }}>MAX PRICE</div>
              <input type="range" min="500" max="1500" step="20" value={maxPrice}

              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--fg-3)', marginTop: 4 }}>
                <span>$500</span><span style={{ color: 'var(--fg)' }}>${maxPrice}</span>
              </div>
            </div>
            <div>
              <div className="mono" style={{ fontSize: 10, color: 'var(--fg-4)', marginBottom: 14 }}>AVAILABILITY</div>

                const checked = availability.includes(a);

                  <label key={a} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 0', cursor: 'pointer', color: 'var(--fg-2)', fontSize: 12 }}>
                    <input type="checkbox" checked={checked}

                    <span style={{
                      width: 14, height: 14, border: '1px solid var(--line-2)',
                      background: checked ? 'var(--fg)' : 'transparent',
                      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    }}>
                      {checked && <span style={{ color: 'var(--bg)', fontSize: 10 }}>✓</span>}
                    </span>
                    {a}
                  </label>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Grid or empty state */}
      {products.length === 0 ? (
        <section style={{ padding: '120px 48px', textAlign: 'center', maxWidth: 640, margin: '0 auto' }}>
          <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 16 }}>
            NOTHING MATCHES
          </div>
          <div className="display" style={{ fontSize: 'clamp(32px, 4vw, 56px)', lineHeight: 1.05 }}>
            All the pieces are away.
          </div>
          <div style={{ color: 'var(--fg-3)', fontSize: 14, lineHeight: 1.7, marginTop: 16, marginBottom: 32 }}>
            No piece in the workshop matches that combination. Loosen one filter — or begin a Made-to-Order commission.
          </div>
          <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
            <button className="btn" onClick={resetFilters}>Clear filters</button>
            <button className="btn btn-ghost" onClick={() => go('mto')}>Begin a commission</button>
          </div>
        </section>
      ) : (
        <div style={{ padding: '48px 48px 32px', display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 32 }}>
          {products.map(p => (
            <ProductCard key={p.id} product={p} onQuickView={onQuickView} go={go} />
          ))}
        </div>
      )}

      {/* SEO essay block */}
      {products.length > 0 && (
        <section style={{ padding: '64px 48px', borderTop: '1px solid var(--line)' }}>
          <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 12 }}>
            ON THE COLLECTION
          </div>
          <div style={{ maxWidth: 720, fontSize: 16, color: 'var(--fg-3)', lineHeight: 1.85 }}>
            Every piece in the MOTOGRIP GEAR collection is cut for movement first: reach at the shoulder, clean structure at the chest, reinforced hardware, and leather that earns its patina on the road. Stock sizing is available now; made-to-measure fit adds $50 and can be tuned per product in the backend later.
          </div>
          <div style={{ marginTop: 24, display: 'flex', gap: 16, flexWrap: 'wrap' }}>
            <button className="mono ulink" onClick={() => go('about')}
              style={{ fontSize: 10, color: 'var(--accent-2)', background: 'transparent', border: 0, cursor: 'pointer' }}>
              READ THE BRAND →
            </button>
            <button className="mono ulink" onClick={() => go('mto')}
              style={{ fontSize: 10, color: 'var(--accent-2)', background: 'transparent', border: 0, cursor: 'pointer' }}>
              START MADE TO MEASURE →
            </button>
          </div>
        </section>
      )}
    </div>
  );
}

Object.assign(window, { Shop });

<script type="text/babel" data-presets="env,react" data-file="ssm-pdp.jsx">
// PDP — Product Detail Page.
//
// Reads p.story / p.maker / p.stock from ssm-data.jsx so each product has a
// real, signed-by-the-maker narrative. Adds a sold-out-aware size grid,
// a "notify when restocked" affordance, a Piece Story panel, a Press &
// Reviews block, and a sticky bottom add-to-bag bar on narrow screens.

function PDP({ product, go, addToCart, onQuickView }) {
  const p = product || SSM_PRODUCTS[0];
  const [leather, setLeather] = React.useState(SSM_LEATHERS[0].id);
  const [size, setSize] = React.useState('M');
  const [imgIdx, setImgIdx] = React.useState(0);
  const [openSection, setOpenSection] = React.useState('details');
  const [notifyOpen, setNotifyOpen] = React.useState(false);
  const [notifyEmail, setNotifyEmail] = React.useState('');
  const [notifyDone, setNotifyDone] = React.useState(false);
  const [fitMode, setFitMode] = React.useState('standard');
  const [measurements, setMeasurements] = React.useState({
    height: '',
    chest: '',
    naturalWaist: '',
    lowerWaist: '',
    shoulder: '',
    hips: '',
    sleeves: '',
    weight: '',
  });

  const images = [
    { label: 'On model · 3/4', src: p.img },
    { label: 'Detail · placket', src: p.alt || p.img },
    { label: 'Detail · stitching', src: SSM_ASSETS.detail },
    { label: 'Back · studio', src: p.img },
    { label: 'Flat lay', src: p.alt || p.img },
  ];

  const lObj = SSM_LEATHERS.find(l => l.id === leather);
  const sizeStock = (s) => p.stock ? (p.stock[s] || 0) : 99;
  const inStock = sizeStock(size) > 0;
  const finalPiece = p.stock && Object.values(p.stock).reduce((a,b) => a+b, 0) <= 4;
  const madeToMeasureSurcharge = p.madeToMeasureSurcharge ?? 50;
  const isMadeToMeasure = fitMode === 'made-to-measure';
  const displayPrice = p.price + (isMadeToMeasure ? madeToMeasureSurcharge : 0);
  const updateMeasurement = (key, value) => setMeasurements(m => ({ ...m, [key]: value }));
  const measurementFields = [
    ['height', 'Height', 'in/cm'],
    ['chest', 'Chest', 'in/cm'],
    ['naturalWaist', 'Natural waist', 'in/cm'],
    ['lowerWaist', 'Lower waist', 'in/cm'],
    ['shoulder', 'Shoulder', 'in/cm'],
    ['hips', 'Hips', 'in/cm'],
    ['sleeves', 'Sleeves', 'in/cm'],
    ['weight', 'Weight', 'lbs'],
  ];
  const productSpecs = [
    ['Body material', p.story?.craft?.split('.')[0] || p.blurb],
    ['Leather type', lObj?.name || 'Selected hide'],
    ['Lining', 'Breathable satin, selected for the house silhouette'],
    ['Closure', p.cat === 'Pants' ? 'Concealed zip and hand-finished waistband' : 'YKK Excella hardware'],
    ['Fit service', `Standard sizing or made to measure (+$${madeToMeasureSurcharge})`],
    ['Customization', 'Available by leather, size, measurements, and custom fit request'],
  ];

  const reviews = [
    { who: 'Iola V., Brooklyn',  rating: 5, date: 'March MMXXVI',  body: `My ${p.name.split(' ')[0]} arrived with a small note from ${p.maker}. Three weeks in, the placket has softened just where I hoped.` },
    { who: 'Theo M., Paris',     rating: 5, date: 'February MMXXVI', body: 'The fit is exact. The hide is heavier than I expected, in the best way. I have not taken it off.' },
    { who: 'Sigrid K., London',  rating: 4, date: 'January MMXXVI',  body: 'A real piece. Sized up over a knit, which I would recommend. The brass darkened beautifully after two weeks.' },
  ];

  return (
    <div className="page-fade">
      {/* Breadcrumb */}
      <nav style={{ padding: '20px 48px', display: 'flex', gap: 8 }} className="mono">
        <button onClick={() => go('home')} style={{ fontSize: 10, color: 'var(--fg-4)', cursor: 'pointer', background: 'transparent', border: 0, padding: 0 }}>HOUSE</button>
        <span style={{ fontSize: 10, color: 'var(--fg-4)' }}>/</span>
        <button onClick={() => go('shop', { gender: p.gender })} style={{ fontSize: 10, color: 'var(--fg-4)', cursor: 'pointer', background: 'transparent', border: 0, padding: 0 }}>{p.gender.toUpperCase()}</button>
        <span style={{ fontSize: 10, color: 'var(--fg-4)' }}>/</span>
        <button onClick={() => go('shop', { cat: p.cat })} style={{ fontSize: 10, color: 'var(--fg-4)', cursor: 'pointer', background: 'transparent', border: 0, padding: 0 }}>{p.cat.toUpperCase()}</button>
        <span style={{ fontSize: 10, color: 'var(--fg-4)' }}>/</span>
        <span style={{ fontSize: 10, color: 'var(--fg-2)' }}>{p.name.toUpperCase()}</span>
      </nav>

      <div style={{
        display: 'grid', gridTemplateColumns: '80px 1fr 480px', gap: 0,
        padding: '0 48px 80px',
      }}>
        {/* Thumbnails */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingTop: 8 }}>
          {images.map((img, i) => (
            <button key={i} onClick={() => setImgIdx(i)}
              aria-label={img.label}
              className="ph tiny" data-img="1" data-label=""
              style={{
                width: 64, aspectRatio: '3/4', cursor: 'pointer',
                '--img': `url(${img.src})`,
                outline: imgIdx === i ? '1px solid var(--fg)' : 'none',
                outlineOffset: 2, opacity: imgIdx === i ? 1 : 0.6,
                background: 'transparent', border: 0, padding: 0,
              }} />
          ))}
        </div>
        {/* Main image */}
        <div style={{ paddingLeft: 24 }}>
          <div className="ph grain" data-img="1" data-label=""
            style={{ aspectRatio: '4/5', position: 'relative', '--img': `url(${images[imgIdx].src})` }}>
            <div style={{ position: 'absolute', top: 16, right: 16, display: 'flex', gap: 8 }}>
              <button aria-label="Save to wishlist"
                style={{ width: 36, height: 36, background: 'rgba(10,9,8,0.6)', backdropFilter: 'blur(10px)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', border: 0, color: 'var(--fg)' }}>
                <Icon name="heart" size={14} />
              </button>
              <button className="mono" aria-label="Zoom"
                style={{ height: 36, padding: '0 14px', background: 'rgba(10,9,8,0.6)', backdropFilter: 'blur(10px)', display: 'inline-flex', alignItems: 'center', fontSize: 9, cursor: 'pointer', border: 0, color: 'var(--fg)' }}>
                ZOOM ⤢
              </button>
            </div>
            <div className="mono" style={{ position: 'absolute', bottom: 16, left: 16, fontSize: 9, color: 'var(--fg-3)' }}>
              {imgIdx + 1} / {images.length} · {images[imgIdx].label.toUpperCase()}
            </div>
          </div>
        </div>

        {/* Details panel */}
        <div style={{ paddingLeft: 48, position: 'sticky', top: 100, alignSelf: 'flex-start' }}>
          <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 10 }}>
            {p.cat.toUpperCase()} · {p.gender.toUpperCase()}
            {p.tag === 'Fit Lab' && <> · FIT LAB</>}
            {finalPiece && <> · FINAL PIECES</>}
          </div>
          <h1 className="display" style={{ fontSize: 48, lineHeight: 1, margin: 0, fontWeight: 400 }}>{p.name}</h1>
          <div style={{ color: 'var(--fg-3)', fontSize: 14, marginTop: 12, lineHeight: 1.6 }}>{p.blurb}</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginTop: 24, marginBottom: 32 }}>
            <span className="display" style={{ fontSize: 32 }}>${displayPrice.toLocaleString()}</span>
            <span className="mono" style={{ fontSize: 9, color: 'var(--fg-4)' }}>USD · DUTIES INCLUDED</span>
          </div>

          {/* Trust strip — moved above the picker */}
          <div style={{ display: 'flex', gap: 12, padding: '14px 0', borderTop: '1px solid var(--line)', borderBottom: '1px solid var(--line)', marginBottom: 24 }}>
            {[
              { i: '✦', t: 'Hand-numbered' },
              { i: '⌖', t: 'Free shipping' },
              { i: '↻', t: 'Lifetime repair' },
            ].map(b => (
              <div key={b.t} style={{ flex: 1, textAlign: 'center' }}>
                <div style={{ fontSize: 14, color: 'var(--accent-2)', marginBottom: 4 }}>{b.i}</div>
                <div className="mono" style={{ fontSize: 9, color: 'var(--fg-3)' }}>{b.t}</div>
              </div>
            ))}
          </div>

          <div className="mono" style={{ fontSize: 10, color: 'var(--fg-3)', marginBottom: 12, display: 'flex', justifyContent: 'space-between' }}>
            <span>LEATHER · {lObj.name.toUpperCase()}</span>
            <span style={{ color: 'var(--fg-4)' }}>{lObj.desc}</span>
          </div>
          <div style={{ display: 'flex', gap: 10, marginBottom: 28 }}>
            {SSM_LEATHERS.map(l => (
              <button key={l.id} className={`swatch ${leather === l.id ? 'active' : ''}`}
                aria-label={l.name} title={l.name}
                style={{ background: l.swatch, padding: 0 }} onClick={() => setLeather(l.id)} />
            ))}
          </div>

          <div className="mono" style={{ fontSize: 10, color: 'var(--fg-3)', marginBottom: 12, display: 'flex', justifyContent: 'space-between' }}>
            <span>SIZE</span>
            <button onClick={() => go('size')} className="ulink"
              style={{ color: 'var(--fg-2)', background: 'transparent', border: 0, padding: 0, cursor: 'pointer', fontFamily: 'var(--mono)', fontSize: 10 }}>
              SIZE GUIDE ↗
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 6, marginBottom: 12 }}>
            {['XS','S','M','L','XL','XXL'].map(s => {
              const stock = sizeStock(s);
              const out = stock === 0;
              const low = stock > 0 && stock < 2;
              return (
                <button key={s} onClick={() => setSize(s)} aria-label={`Size ${s}${out ? ', sold out' : ''}`}
                  style={{
                    height: 44, position: 'relative',
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    border: `1px solid ${size === s ? 'var(--fg)' : 'var(--line-2)'}`,
                    background: size === s ? 'var(--fg)' : 'transparent',
                    color: size === s ? 'var(--bg)' : (out ? 'var(--fg-4)' : 'var(--fg-2)'),
                    fontSize: 12, cursor: 'pointer',
                    textDecoration: out ? 'line-through' : 'none',
                    opacity: out ? 0.6 : 1,
                  }}>
                  {s}
                  {low && <span style={{ position: 'absolute', top: 2, right: 4, fontSize: 7, color: 'var(--accent-2)' }}>·</span>}
                </button>
              );
            })}
          </div>
          {p.stock && (
            <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginBottom: 24 }}>
              {inStock
                ? (sizeStock(size) <= 2
                    ? `${sizeStock(size)} ${sizeStock(size) === 1 ? 'PIECE' : 'PIECES'} REMAIN IN ${size}`
                    : `IN STOCK · ${size}`)
                : `SOLD OUT IN ${size} · NOTIFY ME WHEN RESTOCKED`}
            </div>
          )}

          <div style={{ marginBottom: 24 }}>
            <div className="mono" style={{ fontSize: 10, color: 'var(--fg-3)', marginBottom: 12, display: 'flex', justifyContent: 'space-between' }}>
              <span>FIT</span>
              <span style={{ color: 'var(--fg-4)' }}>MADE TO MEASURE +${madeToMeasureSurcharge}</span>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: isMadeToMeasure ? 14 : 0 }}>
              {[
                { id: 'standard', title: 'Standard size', detail: `Cut to size ${size}` },
                { id: 'made-to-measure', title: 'Made to measure', detail: `Pattern adjusted from your measurements · +$${madeToMeasureSurcharge}` },
              ].map(opt => {
                const active = fitMode === opt.id;
                return (
                  <button key={opt.id} onClick={() => setFitMode(opt.id)}
                    aria-pressed={active}
                    style={{
                      textAlign: 'left', padding: 14, border: `1px solid ${active ? 'var(--accent-2)' : 'var(--line-2)'}`,
                      background: active ? 'rgba(176,138,76,0.08)' : 'transparent',
                      color: 'var(--fg)', minHeight: 82, cursor: 'pointer',
                    }}>
                    <div style={{ fontFamily: 'var(--display)', fontSize: 18, lineHeight: 1.1 }}>{opt.title}</div>
                    <div className="mono" style={{ fontSize: 8, color: active ? 'var(--accent-2)' : 'var(--fg-4)', marginTop: 8, lineHeight: 1.5 }}>
                      {opt.detail.toUpperCase()}
                    </div>
                  </button>
                );
              })}
            </div>
            {isMadeToMeasure && (
              <div className="page-fade" style={{
                display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10,
                padding: 14, border: '1px solid var(--line)', background: 'var(--bg-2)',
              }}>
                {measurementFields.map(([key, label, placeholder]) => (
                  <label key={key} className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', display: 'flex', flexDirection: 'column', gap: 6 }}>
                    {label.toUpperCase()}
                    <input value={measurements[key]} onChange={e => updateMeasurement(key, e.target.value)}
                      placeholder={placeholder}
                      style={{
                        width: '100%', padding: '10px 0', background: 'transparent', border: 'none',
                        borderBottom: '1px solid var(--line-2)', color: 'var(--fg)',
                        fontFamily: 'var(--sans)', fontSize: 13, outline: 'none',
                      }} />
                  </label>
                ))}
              </div>
            )}
          </div>

          {inStock ? (
            <button className="btn" style={{ width: '100%', justifyContent: 'center', marginBottom: 8 }}
              onClick={() => addToCart(p, {
                leather: lObj.name,
                size,
                price: displayPrice,

            <div key={p.id} onClick={() => setPathway(p.id)}
              style={{
                padding: 32, cursor: 'pointer',
                border: `1px solid ${pathway === p.id ? 'var(--accent-2)' : 'var(--line)'}`,
                background: pathway === p.id ? 'var(--bg-2)' : 'transparent',
                marginRight: -1, marginBottom: -1,
              }}>
              <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 12 }}>
                {p.id === 'fit' ? 'I' : p.id === 'custom' ? 'II' : 'III'}
              </div>
              <div style={{ fontFamily: 'var(--display)', fontSize: 28, marginBottom: 8 }}>{p.t}</div>
              <div className="mono" style={{ fontSize: 11, color: 'var(--fg-2)', marginBottom: 12 }}>{p.e}</div>
              <div style={{ color: 'var(--fg-3)', fontSize: 13, lineHeight: 1.7 }}>{p.c}</div>
            </div>
          ))}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 64 }}>
          <div>
            <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 16 }}>
              IV · A SHORT NOTE
            </div>
            <div style={{ marginBottom: 16 }}>
              <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>NAME</div>
              <input placeholder="Your name"
                style={{ width: '100%', padding: '12px 0', background: 'transparent', border: 'none',
                  borderBottom: '1px solid var(--line-2)', color: 'var(--fg)', fontFamily: 'var(--sans)',
                  fontSize: 14, outline: 'none' }} />
            </div>
            <div style={{ marginBottom: 16 }}>
              <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>EMAIL</div>
              <input type="email" placeholder="you@somewhere.com"
                style={{ width: '100%', padding: '12px 0', background: 'transparent', border: 'none',
                  borderBottom: '1px solid var(--line-2)', color: 'var(--fg)', fontFamily: 'var(--sans)',
                  fontSize: 14, outline: 'none' }} />
            </div>
            <div style={{ marginBottom: 24 }}>
              <div className="mono" style={{ fontSize: 9, color: 'var(--fg-4)', marginBottom: 6 }}>MESSAGE</div>
              <textarea rows={5} placeholder="A short note. We will reply, in this hand."
                style={{ width: '100%', padding: '12px 0', background: 'transparent', border: 'none',
                  borderBottom: '1px solid var(--line-2)', color: 'var(--fg)', fontFamily: 'var(--sans)',
                  fontSize: 14, outline: 'none', resize: 'vertical' }} />
            </div>
            <button className="btn">Send</button>
          </div>
          <div>
            <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 16 }}>
              V · BY HAND, BY FOOT
            </div>
            <div style={{ fontFamily: 'var(--display)', fontSize: 24, lineHeight: 1.3, marginBottom: 16 }}>
              MOTOGRIP Fit Garage
            </div>
            <div style={{ color: 'var(--fg-2)', fontSize: 14, lineHeight: 1.8 }}>
              812 Mateo Street<br/>Los Angeles, CA 90021<br/>United States
            </div>
            <div className="mono" style={{ fontSize: 10, color: 'var(--fg-4)', marginTop: 20, lineHeight: 1.8 }}>
              TUE-SAT · 11-6<br/>BY APPOINTMENT<br/>+1 (213) 555 0143
            </div>
            <button className="btn btn-ghost" style={{ marginTop: 24 }} onClick={() => go('stockists')}>
              Other locations
            </button>
          </div>
        </div>
      </section>
    </div>
  );
}

// ── 404 ─────────────────────────────────────────────────────────────────────

function NotFound({ go }) {
  return (
    <div className="page-fade" style={{ minHeight: '60vh' }}>
      <section style={{ padding: '120px 48px', textAlign: 'center', maxWidth: 720, margin: '0 auto' }}>
        <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 16, letterSpacing: '0.4em' }}>
          ✦ &nbsp; XVIII · 404 &nbsp; ✦
        </div>
        <h1 className="display" style={{
          fontSize: 'clamp(48px, 7vw, 104px)', margin: 0, lineHeight: 0.95, fontWeight: 400,
        }}>
          This gear is no longer<br/><em style={{ color: 'var(--accent-2)' }}>available.</em>
        </h1>
        <div style={{ color: 'var(--fg-3)', fontSize: 16, lineHeight: 1.7, marginTop: 32 }}>
          The page you were looking for has either been retired, repaired, or never existed. The collection is just through there.
        </div>
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginTop: 40 }}>
          <button className="btn" onClick={() => go('shop')}>Browse the collection</button>
          <button className="btn btn-ghost" onClick={() => go('home')}>Back to the house</button>
        </div>
      </section>

      <section style={{ padding: '0 48px 96px' }}>
        <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 24 }}>
          STILL HERE · A FEW PIECES
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 32 }}>
          {SSM_PRODUCTS.slice(0, 4).map(p => (
            <ProductCard key={p.id} product={p} onQuickView={() => {}} go={go} />
          ))}
        </div>
      </section>
    </div>
  );
}

// ── Search results ─────────────────────────────────────────────────────────

function SearchResults({ go, query, onQuickView }) {
  const q = (query || '').toLowerCase().trim();
  const products = q
    ? SSM_PRODUCTS.filter(p =>
        (p.name + ' ' + p.cat + ' ' + p.gender + ' ' + p.blurb).toLowerCase().includes(q))
    : [];
  const journal = q
    ? SSM_JOURNAL.filter(j =>
        (j.title + ' ' + j.cat + ' ' + j.dek).toLowerCase().includes(q))
    : [];

  return (
    <div className="page-fade">
      <PageHero
        eyebrow="XIX · SEARCH"
        title={q ? <>Results for</> : <>Search the</>}
        italic={q ? `"${query}".` : 'gear.'}
        meta={q ? `${products.length} pieces · ${journal.length} essays` : ''}
      />

      {!q && (
        <section style={{ padding: '0 48px 96px', textAlign: 'center', color: 'var(--fg-3)' }}>
          <div style={{ fontFamily: 'var(--display)', fontSize: 22 }}>
            Use the search bar in the header.
          </div>
        </section>
      )}

      {q && products.length === 0 && journal.length === 0 && (
        <section style={{ padding: '0 48px 96px', textAlign: 'center', color: 'var(--fg-3)' }}>
          <div style={{ fontFamily: 'var(--display)', fontSize: 28, marginBottom: 8 }}>
            Nothing matches that exact word.
          </div>
          <div className="mono" style={{ fontSize: 10 }}>TRY 'JACKETS', 'COGNAC', 'VOLTAIRE', OR 'TANNING'</div>
          <button className="btn" style={{ marginTop: 24 }} onClick={() => go('shop')}>Browse the collection</button>
        </section>
      )}

      {products.length > 0 && (
        <section style={{ padding: '0 48px 64px' }}>
          <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 24 }}>
            PIECES · {products.length}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 32 }}>
            {products.map(p => <ProductCard key={p.id} product={p} onQuickView={onQuickView} go={go} />)}
          </div>
        </section>
      )}

      {journal.length > 0 && (
        <section style={{ padding: '64px 48px', borderTop: '1px solid var(--line)' }}>
          <div className="mono" style={{ fontSize: 10, color: 'var(--accent-2)', marginBottom: 24 }}>
            ESSAYS · {journal.length}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 32 }}>
            {journal.map(j => (
              <div key={j.id} onClick={() => go('article', { article: j })} style={{ cursor: 'pointer' }} className="card">
                <div className="ph card-img" data-img="1" data-label=""
                  style={{ aspectRatio: '4/5', '--img': `url(${j.hero})` }} />
                <div className="mono" style={{ fontSize: 9, color: 'var(--accent-2)', marginTop: 12 }}>
                  {j.cat.toUpperCase()}
                </div>
                <div style={{ fontFamily: 'var(--display)', fontSize: 22, marginTop: 6 }}>{j.title}</div>
              </div>
            ))}
          </div>
        </section>
      )}
    </div>
  );
}

Object.assign(window, {
  Journal, JournalArticle, Care, Repairs, Concierge, Sustainability,
  Stockists, Press, GiftCards, FAQ, SizeGuide, ShippingReturns,
  Contact, NotFound, SearchResults,
  PageHero, PrincipleTriad, EditorialQuote, CTAStrip,
});
</script>
<script type="text/babel" data-presets="env,react" data-file="ssm-app.jsx">
// Root app — routing + state + tweaks panel + page-level SEO.
//
// Routing is React state (`view` + `params`) — kept this way so the prototype
// continues to work without a build step. The exported `go(view, params)`
// scrolls to top, syncs the URL hash so a refresh keeps you on the page, and
// updates document.title from SSM_SEO. All inner pages are wired here.

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "light",
  "hero": "fullbleed",
  "displayFont": "serif",
  "showAtelier": true,
  "showLookbook": true,
  "showPress": true,
  "accentBoost": false
}/*EDITMODE-END*/;

// SSM_SEO comes from ssm-data.jsx
function applySEO(view, params) {
  const seo = (view === 'shop' && params?.gender === 'Women') ? SSM_SEO.shopWomen
    : (view === 'shop' && params?.gender === 'Men') ? SSM_SEO.shopMen
    : SSM_SEO[view] || SSM_SEO.home;
  let title = seo?.title || 'MOTOGRIP GEAR — Road-Cut Leather Jackets & Moto Gear';
  let desc  = seo?.desc  || '';
  if (view === 'pdp') {
    const p = params?.product || SSM_PRODUCTS[0];
    title = SSM_SEO.pdp.title
      .replace('%name%', p.name)
      .replace('%cat%', p.cat)
      .replace('%gender%', p.gender);
    desc = (p.story?.piece || p.blurb || '').slice(0, 158);
  }
  if (view === 'article' && params?.article) {
    title = `${params.article.title} · MOTOGRIP Road Notes`;
    desc = params.article.dek || '';
  }
  document.title = title;
  let m = document.querySelector('meta[name="description"]');
  if (!m) {
    m = document.createElement('meta'); m.setAttribute('name', 'description');
    document.head.appendChild(m);
  }
  m.setAttribute('content', desc || 'Premium motorcycle leather jackets, vests, and trousers with made-to-measure fit options.');
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = React.useState(() => {
    // Resume from hash on refresh.
    const h = (window.location.hash || '').replace(/^#\/?/, '').split('/')[0];
    return h && ['home','shop','pdp','mto','lookbook','about','account','checkout',
      'journal','article','care','repairs','concierge','sustain','stockists',
      'press','giftcard','faq','size','ship','contact','search','notfound'
    ].includes(h) ? h : 'home';
  });
  const [params, setParams] = React.useState({});
  const [cart, setCart] = React.useState(() => {
    try {
      const raw = window.localStorage && localStorage.getItem('ssm:cart');
      if (raw) return JSON.parse(raw);
    } catch (_) {}
    return [
      { id: 'p2', name: 'Hadley Café Racer', price: 1180, qty: 1, leather: 'Tobacco', size: 'M', img: SSM_PRODUCTS[1].img },
    ];
  });
  const [cartOpen, setCartOpen] = React.useState(false);
  const [quickView, setQuickView] = React.useState(null);
  const [searchOpen, setSearchOpen] = React.useState(false);
  const [searchQuery, setSearchQuery] = React.useState('');

  // Persist cart
  React.useEffect(() => {
    try { window.localStorage && localStorage.setItem('ssm:cart', JSON.stringify(cart)); } catch (_) {}
  }, [cart]);

  // SEO sync
  React.useEffect(() => { applySEO(view, params); }, [view, params]);

  // Hash sync (so refresh keeps you on the right page)
  React.useEffect(() => {
    const h = '#/' + view;
    if (window.location.hash !== h) window.history.replaceState(null, '', h);
  }, [view]);

  const go = (v, p = {}) => {
    setView(v);
    setParams(p);
    window.scrollTo({ top: 0, behavior: 'auto' });
  };

  // Cart merging — same product + size + leather + fit selection increments qty.
  const addToCart = (product, opts) => {
    setCart(prev => {
      const measurementSig = (m) => m ? Object.entries(m).map(([k, v]) => `${k}:${v || ''}`).join('|') : '';
      const sig = (it) => `${it.baseId || it.id.split('-')[0]}|${it.size}|${it.leather}|${it.fitMode || 'standard'}|${measurementSig(it.measurements)}`;
      const incoming = {
        baseId: product.id,
        id: product.id + '-' + Date.now(),
        name: product.name,
        price: opts.price ?? (product.price + (opts.surcharge || 0)),
        basePrice: product.price,
        surcharge: opts.surcharge || 0,
        qty: 1,
        img: product.img,
        leather: opts.leather, size: opts.size,
        fitMode: opts.fitMode || 'standard',
        fitLabel: opts.fitLabel || null,
        measurements: opts.measurements || null,
      };
      const idx = prev.findIndex(it => sig(it) === sig(incoming));
      if (idx > -1) {
        return prev.map((it, i) => i === idx ? { ...it, qty: it.qty + 1 } : it);
      }
      return [...prev, incoming];
    });
    setCartOpen(true);
  };

  // Search submit
  const submitSearch = (q) => {
    setSearchQuery(q);
    setSearchOpen(false);
    go('search', {});
  };

  const themeClass =
    (t.palette === 'dark' ? 'theme-dark ' : t.palette === 'heritage' ? 'theme-heritage ' : 'theme-light ') +
    'font-' + t.displayFont;

  return (
    <div className={themeClass} style={{ minHeight: '100vh', background: 'var(--bg)', color: 'var(--fg)' }}>
      <Header go={go} view={view}
        onCartClick={() => setCartOpen(true)}
        onSearchClick={() => setSearchOpen(true)}
        cartCount={cart.reduce((n, it) => n + it.qty, 0)} />

      {view === 'home' && <Home go={go} onQuickView={setQuickView} heroVariant={t.hero} />}
      {view === 'shop' && <Shop go={go} onQuickView={setQuickView} initialGender={params.gender} initialCat={params.cat} />}
      {view === 'pdp' && <PDP product={params.product} go={go} addToCart={addToCart} onQuickView={setQuickView} />}
      {view === 'mto' && <MTO go={go} startWith={params.startWith} addToCart={addToCart} />}
      {view === 'lookbook' && <Lookbook go={go} />}
      {view === 'about' && <About go={go} />}
      {view === 'account' && <Account go={go} />}
      {view === 'checkout' && <Checkout go={go} items={cart} setItems={setCart} />}
      {view === 'journal' && <Journal go={go} />}
      {view === 'article' && <JournalArticle go={go} article={params.article} />}
      {view === 'care' && <Care go={go} />}
      {view === 'repairs' && <Repairs go={go} />}
      {view === 'concierge' && <Concierge go={go} />}
      {view === 'sustain' && <Sustainability go={go} />}
      {view === 'stockists' && <Stockists go={go} />}
      {view === 'press' && <Press go={go} />}
      {view === 'giftcard' && <GiftCards go={go} />}
      {view === 'faq' && <FAQ go={go} />}
      {view === 'size' && <SizeGuide go={go} />}
      {view === 'ship' && <ShippingReturns go={go} />}
      {view === 'contact' && <Contact go={go} />}
      {view === 'search' && <SearchResults go={go} query={searchQuery} onQuickView={setQuickView} />}
      {view === 'notfound' && <NotFound go={go} />}

      <Footer go={go} />

      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)}
        items={cart} setItems={setCart} go={go} />
      <QuickView product={quickView} onClose={() => setQuickView(null)} addToCart={addToCart} go={go} />
      <SearchOverlay open={searchOpen} onClose={() => setSearchOpen(false)} onSubmit={submitSearch} />

      <TweaksPanel title="MOTOGRIP · Tweaks">
        <TweakSection label="Palette" />
        <TweakRadio label="Theme" value={t.palette}
          options={[
            { value: 'dark', label: 'Dark' },
            { value: 'light', label: 'Light' },
            { value: 'heritage', label: 'Heritage' },
          ]}
          onChange={v => setTweak('palette', v)} />

        <TweakSection label="Hero Layout" />
        <TweakRadio label="Variant" value={t.hero}
          options={[
            { value: 'fullbleed', label: 'Bleed' },
            { value: 'editorial-split', label: 'Split' },
            { value: 'centered-type', label: 'Type' },
          ]}
          onChange={v => setTweak('hero', v)} />

        <TweakSection label="Typography" />
        <TweakRadio label="Display" value={t.displayFont}
          options={[
            { value: 'serif', label: 'Serif' },
            { value: 'sans', label: 'Sans' },
            { value: 'mono', label: 'Mono' },
          ]}
          onChange={v => setTweak('displayFont', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
